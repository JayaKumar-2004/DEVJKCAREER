<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Boot | Dudhsagar Falls</title>
    <style>
        /* --- GLOBAL RESET & THEME --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }
        
        body {
            background-color: #020a04; /* Deep Night Jungle Green */
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 12vh; /* Pushes HUD up away from the train tracks */
            position: relative;
        }

        /* --- DUDHSAGAR FALLS & JUNGLE GORGE --- */
        .scenery-viewport {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            overflow: hidden;
            background: linear-gradient(to bottom, #010602 0%, #051a0a 100%);
        }

        /* Dark Jungle Cliffs framing the sides */
        .cliff-left, .cliff-right {
            position: absolute;
            top: 0;
            width: 35vw;
            height: 100vh;
            background: #010803;
            z-index: 3;
        }
        .cliff-left {
            left: 0;
            box-shadow: 20px 0 50px rgba(0,0,0,0.9);
            border-right: 2px solid #0a2912;
        }
        .cliff-right {
            right: 0;
            box-shadow: -20px 0 50px rgba(0,0,0,0.9);
            border-left: 2px solid #0a2912;
        }

        /* Rushing Water Columns */
        .waterfall-core {
            position: absolute;
            top: 0;
            left: 25vw;
            width: 50vw;
            height: 100vh;
            background: linear-gradient(to bottom, rgba(255,255,255,0.2) 0%, rgba(200,245,255,0.8) 70%, rgba(255,255,255,0.95) 100%);
            z-index: 2;
        }

        .waterfall-streams {
            position: absolute;
            top: 0;
            left: 25vw;
            width: 50vw;
            height: 100vh;
            background: repeating-linear-gradient(
                90deg,
                rgba(255, 255, 255, 0) 0px,
                rgba(255, 255, 255, 0.4) 8px,
                rgba(180, 240, 255, 0.7) 16px,
                rgba(255, 255, 255, 0) 24px
            );
            background-size: 100% 200%;
            animation: rushDown 0.4s linear infinite;
            z-index: 2;
            opacity: 0.8;
        }

        @keyframes rushDown {
            0% { background-position: 0 0%; }
            100% { background-position: 0 100%; }
        }

        /* Heavy Mist Cloud at Base */
        .mist-cloud {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100vw;
            height: 35vh;
            background: linear-gradient(to top, rgba(255,255,255,0.9) 0%, rgba(200,240,255,0.5) 50%, transparent 100%);
            filter: blur(12px);
            z-index: 4;
            animation: mistBillow 4s ease-in-out infinite alternate;
        }

        @keyframes mistBillow {
            0% { transform: scaleY(1) translateY(0); opacity: 0.8; }
            100% { transform: scaleY(1.15) translateY(-15px); opacity: 1; }
        }

        /* --- RAILWAY BRIDGE & MOVING TRAIN (LOWER THIRD) --- */
        .railway-bridge {
            position: absolute;
            bottom: 20%;
            left: 0;
            width: 100vw;
            height: 16px;
            background: #151515;
            border-top: 3px solid #444;
            border-bottom: 4px solid #000;
            box-shadow: 0 15px 25px rgba(0,0,0,0.8);
            z-index: 5; /* Sits in front of cliffs and mist */
        }

        .bridge-pillars {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100vw;
            height: 20%;
            background: repeating-linear-gradient(
                90deg,
                transparent 0%,
                transparent 12%,
                #0d0d0d 12%,
                #1a1a1a 15%,
                transparent 15%
            );
            z-index: 4;
        }

        .train-track {
            position: absolute;
            bottom: calc(20% - 2.8rem);
            left: 0;
            width: 100vw;
            z-index: 6; /* Sits in front of everything */
        }

        .train-emojis {
            display: inline-block;
            font-size: 2.6rem;
            white-space: nowrap;
            filter: drop-shadow(0 5px 8px rgba(0,0,0,0.7));
            animation: chugTrain 6.5s linear forwards;
            will-change: transform;
        }

        @keyframes chugTrain {
            0% { transform: translate3d(100vw, 0, 0); }
            100% { transform: translate3d(-250vw, 0, 0); }
        }

        /* --- GLASSMORPHIC HUD CONSOLE (CENTERED ABOVE TRACKS) --- */
        .hud-box {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 440px;
            min-height: 320px;
            background: rgba(2, 12, 6, 0.85); /* Darker, high-contrast jungle glass */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid #00ff73;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8), inset 0 0 20px rgba(0, 255, 115, 0.15);
            padding: 22px 18px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* --- TYPOGRAPHY --- */
        .text-line {
            font-size: 1.1rem;
            font-weight: bold;
            line-height: 1.6;
            margin: 6px 0;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.9);
        }

        .highlight-green { color: #00ff73; text-shadow: 0 0 10px rgba(0, 255, 115, 0.6); }
        .highlight-white { color: #ffffff; text-shadow: 0 0 10px rgba(255,255,255,0.8); }

        .hidden { display: none !important; }
        
        .fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* --- IDENTITY REVEAL --- */
        .identity-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .name-primary {
            font-size: 1.7rem;
            color: #ffffff;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.9);
        }

        .name-secondary {
            font-size: 1.15rem;
            color: #00ff73;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .aliases-wrapper {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 8px 0;
            flex-wrap: wrap;
        }

        .tag {
            padding: 4px 10px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 0.9rem;
            font-weight: bold;
            letter-spacing: 1px;
            border-radius: 4px;
        }

        .tag-green {
            border-color: #00ff73;
            background: rgba(0, 255, 115, 0.15);
            color: #00ff73;
            box-shadow: 0 0 8px rgba(0, 255, 115, 0.4);
        }

        .role-title {
            font-size: 1.05rem;
            color: #ffffff;
            font-weight: 800;
            margin-top: 8px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* --- MIST WHITEOUT EXIT ANIMATION --- */
        .mist-exit {
            animation: whiteOut 0.8s forwards;
        }

        @keyframes whiteOut {
            0% { opacity: 1; filter: brightness(1); }
            100% { opacity: 0; filter: brightness(8) blur(15px); transform: scale(1.08); }
        }
    </style>
</head>
<body>

    <div class="scenery-viewport">
        <div class="cliff-left"></div>
        <div class="cliff-right"></div>
        <div class="waterfall-core"></div>
        <div class="waterfall-streams"></div>
        <div class="bridge-pillars"></div>
        <div class="mist-cloud"></div>
        <div class="railway-bridge"></div>
    </div>

    <div class="train-track">
        <div class="train-emojis">🚂🚋🚃🚋🚃🚋🚃🚋🚃🚋🚃🚋🚃</div>
    </div>

    <div class="hud-box" id="hud">
        
        <div id="step-sync" class="text-line">
            <div class="highlight-green" style="font-size: 1.25rem; margin-bottom: 10px;">[ ENVIRONMENT SYNC ]</div>
            <div>> LOCAL TIME DETECTED...</div>
            <div style="margin-top: 8px;">DATE: <span id="clock-date" class="highlight-white"></span></div>
            <div>TIME: <span id="clock-time" class="highlight-white"></span></div>
        </div>

        <div id="step-greet" class="hidden text-line">
            <div class="highlight-white" style="font-size: 1.05rem; margin-bottom: 10px;">[ PRESENCE VERIFIED ]</div>
            <div id="dynamic-greeting" class="highlight-green" style="font-size: 1.2rem; line-height: 1.5;"></div>
        </div>

        <div id="step-identity" class="hidden identity-container">
            <div class="name-primary">JAYA KUMAR</div>
            <div class="name-secondary">( S JAYA KUMAR )</div>
            
            <div class="aliases-wrapper">
                <span class="tag">STARK DEV</span>
                <span class="tag tag-green">JACK</span>
            </div>
            
            <div class="role-title">FULL-STACK DEVELOPER</div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            
            // 1. LIVE CLOCK & DATE ENGINE
            function runClock() {
                const now = new Date();
                const days = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"];
                const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
                
                const dateStr = `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
                
                const hrs = String(now.getHours()).padStart(2, '0');
                const mins = String(now.getMinutes()).padStart(2, '0');
                const secs = String(now.getSeconds()).padStart(2, '0');
                const timeStr = `${hrs}:${mins}:${secs} IST`;

                const dateEl = document.getElementById('clock-date');
                const timeEl = document.getElementById('clock-time');
                if (dateEl) dateEl.textContent = dateStr;
                if (timeEl) timeEl.textContent = timeStr;

                return now.getHours();
            }

            const currentHour = runClock();
            setInterval(runClock, 1000);

            // 2. DYNAMIC TIME-BASED GREETING LOGIC
            let timeOfDay = "evening";
            if (currentHour >= 4 && currentHour < 12) {
                timeOfDay = "morning";
            } else if (currentHour >= 12 && currentHour < 17) {
                timeOfDay = "afternoon";
            }
            
            const greetingString = `> Good ${timeOfDay} and welcome to portfolio sir / ma'am.`;
            document.getElementById('dynamic-greeting').textContent = greetingString;

            // 3. EXACT 7-SECOND CHOREOGRAPHY
            const stepSync = document.getElementById('step-sync');
            const stepGreet = document.getElementById('step-greet');
            const stepIdentity = document.getElementById('step-identity');

            // 0.0s to 2.5s: Time Sync shows while the train chugs onto the bridge below
            
            // 2.5s to 4.5s: Dynamic Greeting
            setTimeout(() => {
                stepSync.classList.add('hidden');
                stepGreet.classList.remove('hidden');
                stepGreet.classList.add('fade-in');
            }, 2500);

            // 4.5s to 6.2s: Grand Name & Identity Reveal
            setTimeout(() => {
                stepGreet.classList.add('hidden');
                stepIdentity.classList.remove('hidden');
                stepIdentity.classList.add('fade-in');
            }, 4500);

            // 6.2s to 7.0s: Mist Whiteout Transition
            setTimeout(() => {
                document.body.classList.add('mist-exit');
            }, 6200);

            // 7.0s: Automatic Redirect to Main Landing Page
            setTimeout(() => {
                // IMPORTANT: If your main portfolio page is named index.html, change 'home.html' below to 'index.html'
                window.location.href = 'home.html'; 
            }, 7000);
        });
    </script>
</body>
</html>
