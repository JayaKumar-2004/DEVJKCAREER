<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Boot | 3D Street</title>
    <style>
        /* --- GLOBAL RESET & DYNAMIC THEME VARIABLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }
        
        :root {
            /* Night Theme Defaults */
            --sky-top: #020111;
            --sky-bottom: #120b2e;
            --horizon-glow: rgba(0, 243, 255, 0.4);
            --road-color: #0d0f12;
            --line-color: rgba(255, 255, 255, 0.6);
            --building-color: #060810;
            --window-color: #00f3ff;
            --window-opacity: 0.8;
            --star-opacity: 1;
        }

        /* Morning / Day Theme */
        body.theme-day {
            --sky-top: #3aacf8;
            --sky-bottom: #c0e8ff;
            --horizon-glow: rgba(255, 255, 255, 0.8);
            --road-color: #2a2e35;
            --line-color: rgba(255, 255, 255, 0.9);
            --building-color: #1a222c;
            --window-color: #8ab4f8; /* Dark tinted daylight glass */
            --window-opacity: 0.3;
            --star-opacity: 0;
        }

        /* Sunset Theme */
        body.theme-sunset {
            --sky-top: #5e1358;
            --sky-bottom: #ff6a00;
            --horizon-glow: rgba(255, 106, 0, 0.8);
            --road-color: #140d11;
            --line-color: rgba(255, 200, 150, 0.7);
            --building-color: #12080a;
            --window-color: #ffae00; /* Warm orange sunset windows */
            --window-opacity: 0.7;
            --star-opacity: 0.3;
        }

        /* UNLOCKED BODY */
        body {
            background: linear-gradient(to bottom, var(--sky-top), var(--sky-bottom));
            color: #ffffff;
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding-top: clamp(8vh, 15vh, 18vh);
            position: relative;
            overflow: hidden;
            transition: background 2s ease-in-out;
        }

        /* --- 3D ENVIRONMENT ENGINE --- */
        .viewport-3d {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; height: 100%;
            perspective: 800px; /* Creates the deep 1-point street perspective */
            perspective-origin: 50% 50%;
            z-index: 1;
            overflow: hidden;
            pointer-events: none;
        }

        /* The Horizon / Sky at the end of the street */
        .horizon {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 150vw; height: 30vh;
            background: radial-gradient(ellipse at center, var(--horizon-glow) 0%, transparent 60%);
            filter: blur(20px);
            z-index: 1;
        }

        /* Twinkling Stars */
        .stars {
            position: absolute; top: 0; left: 0; width: 100%; height: 60%; z-index: 0; opacity: var(--star-opacity); transition: opacity 2s;
        }
        .stars::after {
            content: ''; position: absolute; width: 2px; height: 2px; background: transparent;
            box-shadow: 10vw 10vh #fff, 20vw 25vh #fff, 30vw 5vh #fff, 40vw 30vh #fff, 70vw 8vh #fff, 80vw 35vh #fff, 90vw 28vh #fff;
            animation: twinkle 4s infinite alternate;
        }
        @keyframes twinkle { 0% { opacity: 0.2; } 100% { opacity: 1; } }

        /* The 3D Road */
        .street-floor {
            position: absolute;
            bottom: -30vh; left: -50vw;
            width: 200vw; height: 100vh;
            background-color: var(--road-color);
            /* Double white lines matching your reference photo */
            background-image: 
                linear-gradient(to right, transparent calc(50% - 8px), var(--line-color) calc(50% - 8px), var(--line-color) calc(50% - 2px), transparent calc(50% - 2px), transparent calc(50% + 2px), var(--line-color) calc(50% + 2px), var(--line-color) calc(50% + 8px), transparent calc(50% + 8px)),
                linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.5) 50%);
            background-size: 100% 100%, 100% 60px;
            transform: rotateX(82deg);
            transform-origin: bottom center;
            box-shadow: inset 0 0 100px #000;
            animation: moveRoad 1s linear infinite;
            z-index: 2;
        }

        @keyframes moveRoad {
            0% { background-position: 0 0px; }
            100% { background-position: 0 60px; }
        }

        /* The 3D Buildings Flanking the Street */
        .building-wall {
            position: absolute;
            top: -20vh;
            width: 150vw; height: 120vh;
            background-color: var(--building-color);
            border-top: 5px solid #000;
            /* Generating repeating lit windows */
            background-image: radial-gradient(circle, var(--window-color) 2px, transparent 3px);
            background-size: 30px 40px;
            opacity: 0.95;
            z-index: 3;
            transition: background-color 2s;
        }
        
        .building-wall::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,calc(1 - var(--window-opacity)));
            transition: background 2s;
        }

        .wall-left {
            left: -100vw;
            transform: rotateY(82deg);
            transform-origin: right center;
            box-shadow: inset -50px 0 100px rgba(0,0,0,0.9);
            animation: moveWallsLeft 4s linear infinite;
        }

        .wall-right {
            right: -100vw;
            transform: rotateY(-82deg);
            transform-origin: left center;
            box-shadow: inset 50px 0 100px rgba(0,0,0,0.9);
            animation: moveWallsRight 4s linear infinite;
        }

        @keyframes moveWallsLeft { 0% { background-position: 0px 0; } 100% { background-position: 120px 0; } }
        @keyframes moveWallsRight { 0% { background-position: 0px 0; } 100% { background-position: -120px 0; } }

        /* --- STACKED HUD CONSOLE (ZERO EMPTY BOXES) --- */
        .hud-box {
            position: relative; z-index: 10;
            width: 88%; max-width: 480px; min-height: clamp(200px, 25vh, 240px);
            background: rgba(4, 7, 12, 0.75);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            padding: clamp(16px, 4vw, 24px);
            display: grid; /* Grid stacks all steps directly on top of each other */
            place-items: center;
            text-align: center;
        }

        .hud-step {
            grid-area: 1 / 1;
            width: 100%;
            opacity: 0;
            transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out;
            transform: translateY(8px);
            pointer-events: none;
        }

        .hud-step.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- TYPOGRAPHY & ANIMATIONS --- */
        .text-line { font-size: clamp(1rem, 3vw, 1.2rem); font-weight: bold; line-height: 1.6; margin: 4px 0; text-shadow: 0 2px 5px rgba(0,0,0,0.9); }
        .highlight-cyan { color: #00f3ff; text-shadow: 0 0 12px rgba(0,243,255,0.6); }
        .highlight-white { color: #ffffff; text-shadow: 0 0 10px rgba(255,255,255,0.8); }
        .highlight-gold { color: #ffd700; text-shadow: 0 0 12px rgba(255,215,0,0.6); }
        
        .name-primary { font-size: clamp(1.5rem, 4.5vw, 2rem); color: #ffffff; font-weight: 900; letter-spacing: 2px; }
        .name-secondary { font-size: clamp(0.95rem, 3vw, 1.2rem); color: #00f3ff; font-weight: bold; margin-top: 6px; }
        .role-title { font-size: clamp(0.85rem, 2.8vw, 1.1rem); color: #ffd700; font-weight: 800; margin-top: 12px; letter-spacing: 1.5px; text-transform: uppercase; }

        .warp-exit { animation: warpOut 0.8s forwards; }
        @keyframes warpOut { 100% { opacity: 0; filter: blur(12px) brightness(3); transform: scale(1.5); } }
    </style>
</head>
<body class="theme-night" id="dynamic-body">

    <!-- 3D Perspective Street Environment -->
    <div class="viewport-3d">
        <div class="stars"></div>
        <div class="horizon"></div>
        <div class="building-wall wall-left"></div>
        <div class="building-wall wall-right"></div>
        <div class="street-floor"></div>
    </div>

    <!-- Smooth Stacked HUD Console -->
    <div class="hud-box" id="hud">
        
        <!-- Step 1: Time of Day Greeting (0s - 2.5s) -->
        <div id="step-1" class="hud-step active">
            <div id="dynamic-time-greet" class="highlight-cyan" style="font-size: clamp(1.2rem, 4vw, 1.5rem); font-weight: bold;"></div>
        </div>

        <!-- Step 2: Date & Time (2.5s - 5s) -->
        <div id="step-2" class="hud-step">
            <div class="text-line" style="margin-bottom: 6px;">DATE: <span id="clock-date" class="highlight-white"></span></div>
            <div class="text-line">TIME: <span id="clock-time" class="highlight-white"></span></div>
        </div>

        <!-- Step 3: Welcome Sir / Ma'am (5s - 7.5s) -->
        <div id="step-3" class="hud-step">
            <div class="highlight-gold" style="font-size: clamp(1.2rem, 4vw, 1.5rem); font-weight: bold;">> Welcome Sir / Ma'am <</div>
        </div>

        <!-- Step 4: Portfolio Title (7.5s - 9.5s) -->
        <div id="step-4" class="hud-step">
            <div class="highlight-white" style="font-size: clamp(1.1rem, 3.5vw, 1.4rem); font-weight: 900; letter-spacing: 1px;">A STARK DEV</div>
            <div class="highlight-cyan" style="font-size: clamp(1.1rem, 3.5vw, 1.4rem); font-weight: 900; letter-spacing: 1px; margin-top: 6px;">CAREER PORTFOLIO</div>
        </div>
        
        <!-- Step 5: Name & Developer Identity (9.5s - 12s) -->
        <div id="step-5" class="hud-step">
            <div class="name-primary">JAYA KUMAR</div>
            <div class="name-secondary">( S JAYA KUMAR )</div>
            <div class="role-title">> A DEVELOPER <</div>
        </div>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            function runClockAndTheme() {
                const now = new Date();
                const days = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"];
                const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
                
                const dateEl = document.getElementById('clock-date');
                const timeEl = document.getElementById('clock-time');
                if (dateEl) dateEl.textContent = `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
                if (timeEl) timeEl.textContent = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')} IST`;

                const currentHour = now.getHours();
                const body = document.getElementById('dynamic-body');
                body.classList.remove('theme-day', 'theme-sunset', 'theme-night');

                let timeOfDay = "Evening";
                if (currentHour >= 6 && currentHour < 16) {
                    body.classList.add('theme-day');
                    timeOfDay = currentHour >= 12 ? "Afternoon" : "Morning";
                } else if (currentHour >= 16 && currentHour < 19) {
                    body.classList.add('theme-sunset');
                } else {
                    body.classList.add('theme-night');
                    if(currentHour >= 0 && currentHour < 6) timeOfDay = "Morning";
                }
                return timeOfDay;
            }

            let greetingTime = runClockAndTheme();
            setInterval(runClockAndTheme, 1000);
            
            document.getElementById('dynamic-time-greet').textContent = `> Good ${greetingTime} <`;

            const steps = [
                document.getElementById('step-1'),
                document.getElementById('step-2'),
                document.getElementById('step-3'),
                document.getElementById('step-4'),
                document.getElementById('step-5')
            ];

            function switchStep(fromIndex, toIndex) {
                steps[fromIndex].classList.remove('active');
                steps[toIndex].classList.add('active');
            }

            // --- 12-SECOND SMOOTH STACKED TIMELINE ---
            setTimeout(() => switchStep(0, 1), 2500); // 2.5s: Show Date & Time
            setTimeout(() => switchStep(1, 2), 5000); // 5.0s: Welcome Sir/Ma'am
            setTimeout(() => switchStep(2, 3), 7500); // 7.5s: Portfolio Title
            setTimeout(() => switchStep(3, 4), 9500); // 9.5s: Name & Identity

            // 11.3s: Trigger cinematic warp exit straight down the street
            setTimeout(() => { document.body.classList.add('warp-exit'); }, 11300);

            // 12.0s: Redirect to landing page
            setTimeout(() => { window.location.href = 'home.html'; }, 12000);
        });
    </script>
</body>
</html>
