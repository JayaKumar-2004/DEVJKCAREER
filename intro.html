<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Boot | Cinematic City</title>
    <style>
        /* --- GLOBAL RESET & DYNAMIC THEME VARIABLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }
        
        :root {
            /* Night Theme Defaults */
            --sky-top: #03040e;
            --sky-bottom: #12102b;
            --celestial-color: #f4f6ff; 
            --celestial-shadow: 0 0 40px #f4f6ff, 0 0 100px rgba(244, 246, 255, 0.5);
            --building-bg: linear-gradient(to bottom, #060810 0%, #020305 100%);
            --window-color1: rgba(255, 215, 0, 0.85); /* Gold */
            --window-color2: rgba(0, 243, 255, 0.85); /* Cyan */
            --gate-glow: rgba(255, 215, 0, 0.9);
            --road-color: #0b0c10;
            --lamp-glow: 0 0 15px #ffdd88, 0 0 30px #ffdd88;
            --lamp-bulb: #ffdd88;
            --cloud-opacity: 0.25;
            --star-opacity: 1;
        }

        /* Morning / Day Theme - LIGHTS OFF */
        body.theme-day {
            --sky-top: #209ced;
            --sky-bottom: #7dd0ff;
            --celestial-color: #FFD700; 
            --celestial-shadow: 0 0 60px #FFD700, 0 0 120px #FF8C00;
            --building-bg: linear-gradient(to bottom, #152233 0%, #0c1520 100%);
            --window-color1: rgba(30, 50, 70, 0.6); 
            --window-color2: rgba(25, 60, 80, 0.6);
            --gate-glow: rgba(40, 60, 80, 0.5);
            --road-color: #1a1e24;
            --lamp-glow: none;
            --lamp-bulb: #777777;
            --cloud-opacity: 0.9;
            --star-opacity: 0;
        }

        /* Sunset Theme - LIGHTS TURNING ON */
        body.theme-sunset {
            --sky-top: #3b123d;
            --sky-bottom: #d63c3c;
            --celestial-color: #ff6a00; 
            --celestial-shadow: 0 0 60px #ff6a00, 0 0 110px #ff9d00;
            --building-bg: linear-gradient(to bottom, #170912 0%, #0a0408 100%);
            --window-color1: rgba(255, 174, 0, 0.8); 
            --window-color2: rgba(255, 81, 0, 0.8);
            --gate-glow: rgba(255, 150, 0, 0.8);
            --road-color: #120a0e;
            --lamp-glow: 0 0 15px #ffaa00, 0 0 25px #ffaa00;
            --lamp-bulb: #ffaa00;
            --cloud-opacity: 0.7;
            --star-opacity: 0.3;
        }

        /* UNLOCKED BODY: Auto-expands to fill 100% of any screen dynamically */
        body {
            background: linear-gradient(to bottom, var(--sky-top), var(--sky-bottom));
            color: #ffffff;
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding-top: clamp(8vh, 12vh, 15vh);
            position: relative;
            overflow: hidden;
            transition: background 2s ease-in-out;
        }

        /* --- SKY, FLIGHTS & CELESTIAL LAYER --- */
        .sky-layer {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none;
        }

        .celestial-body {
            position: absolute; left: 50%; top: 10vh;
            transform: translateX(-50%);
            width: clamp(55px, 8vw, 85px); height: clamp(55px, 8vw, 85px);
            border-radius: 50%;
            background: var(--celestial-color);
            box-shadow: var(--celestial-shadow);
            z-index: 2;
        }

        .stars {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: var(--star-opacity); transition: opacity 2s;
        }
        .stars::after {
            content: ''; position: absolute; width: 2px; height: 2px; background: transparent;
            box-shadow: 
                10vw 10vh #fff, 20vw 25vh #fff, 30vw 5vh #fff, 40vw 30vh #fff, 
                50vw 15vh #fff, 60vw 22vh #fff, 70vw 8vh #fff, 80vw 35vh #fff, 
                85vw 15vh #fff, 15vw 40vh #fff, 25vw 20vh #fff, 90vw 28vh #fff;
            animation: twinkle 4s infinite alternate;
        }
        @keyframes twinkle { 0% { opacity: 0.2; } 100% { opacity: 1; } }

        .clouds {
            position: absolute; top: 10%; left: 0; width: 100%; height: 30vh; z-index: 2; opacity: var(--cloud-opacity); pointer-events: none;
        }
        .cloud { position: absolute; background: #fff; border-radius: 50px; filter: blur(3px); }
        .cloud::before, .cloud::after { content: ''; position: absolute; background: #fff; border-radius: 50%; }
        .cloud-1 { top: 10%; width: 120px; height: 40px; animation: floatRight 55s linear infinite; }
        .cloud-1::before { width: 50px; height: 50px; top: -25px; left: 15px; }
        .cloud-1::after { width: 40px; height: 40px; top: -15px; left: 60px; }
        .cloud-2 { top: 50%; width: 90px; height: 30px; animation: floatLeft 45s linear infinite; }
        .cloud-2::before { width: 40px; height: 40px; top: -15px; left: 15px; }

        @keyframes floatRight { 0% { transform: translateX(-20vw); } 100% { transform: translateX(110vw); } }
        @keyframes floatLeft { 0% { transform: translateX(110vw); } 100% { transform: translateX(-20vw); } }

        /* Commercial Flight (Airplane) */
        .airplane {
            position: absolute; top: 18vh; right: -50px;
            width: 28px; height: 8px; background: #333;
            border-radius: 50% 50% 50% 50% / 80% 80% 20% 20%;
            z-index: 3; animation: flyAcross 22s linear infinite;
        }
        .airplane::before {
            content: ''; position: absolute; top: 2px; left: -20px;
            width: 20px; height: 4px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8));
            border-radius: 50%;
        }
        .airplane::after {
            content: ''; position: absolute; top: -3px; left: 12px;
            width: 4px; height: 4px; border-radius: 50%;
            background: red; box-shadow: 0 0 8px red;
            animation: blinkFast 0.8s infinite;
        }
        @keyframes flyAcross { 0% { transform: translateX(10vw) scale(0.8); } 100% { transform: translateX(-110vw) scale(1); } }
        @keyframes blinkFast { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }

        /* --- CITY SKYLINE: AUTO-EXPANDS PROPORTIONALLY TO FIT 100% WIDTH --- */
        .city-skyline {
            position: absolute; bottom: 60px; left: 0; right: 0; width: 100%; height: clamp(30vh, 40vh, 48vh);
            z-index: 4; pointer-events: none;
            display: flex; align-items: flex-end; justify-content: space-between;
        }

        .building {
            position: relative; height: 100%;
            background: var(--building-bg);
            border-top: 1px solid rgba(255,255,255,0.15);
            border-right: 1px solid rgba(0,0,0,0.6);
            box-shadow: inset -5px 0 15px rgba(0,0,0,0.5);
            transition: background 2s;
            flex: 1 1 auto; /* Organically shares screen space without clipping */
        }
        .building::before {
            content: ''; position: absolute; top: 10px; left: 0; right: 0; bottom: 15px;
            background-position: center top; transition: background-image 2s;
        }
        .building::after {
            content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            height: 12px; background: var(--gate-glow);
            box-shadow: 0 0 10px var(--gate-glow);
            border-radius: 2px 2px 0 0; transition: all 2s;
        }

        .b1 { height: 60%; }
        .b1::before { background-image: radial-gradient(circle, var(--window-color1) 1.5px, transparent 2px); background-size: 14px 20px; }
        .b1::after { width: 25%; }

        .b2 { height: 85%; z-index: 5; }
        .b2::before { background-image: radial-gradient(circle, var(--window-color2) 1.5px, transparent 2px); background-size: 18px 24px; }
        .b2::after { width: 30%; height: 16px; }

        .b3 { height: 75%; }
        .b3::before { background-image: radial-gradient(circle, var(--window-color1) 1px, transparent 1.5px); background-size: 12px 18px; }
        .b3::after { width: 35%; height: 20px; }

        .b4 { height: 95%; z-index: 5; }
        .b4::before { background-image: radial-gradient(circle, var(--window-color2) 2px, transparent 2.5px); background-size: 20px 28px; }
        .b4::after { width: 28%; height: 16px; }

        .b5 { height: 50%; }
        .b5::before { background-image: radial-gradient(circle, var(--window-color1) 1.5px, transparent 2px); background-size: 16px 22px; }
        .b5::after { width: 30%; }

        /* --- THE HIGHWAY: UNLOCKED 100% WIDTH --- */
        .highway {
            position: absolute; bottom: 0; left: 0; right: 0;
            width: 100%; height: 60px; 
            background: var(--road-color);
            border-top: 2px solid #1a1e29;
            box-shadow: 0 -15px 30px rgba(0,0,0,0.9);
            z-index: 6; overflow: visible;
        }

        .street-lamps {
            position: absolute; top: -35px; left: 0; right: 0; width: 100%; height: 35px;
            display: flex; justify-content: space-around;
        }
        .lamp { position: relative; width: 3px; height: 100%; background: #222; }
        .lamp::before {
            content: ''; position: absolute; top: -4px; left: -3px;
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--lamp-bulb); box-shadow: var(--lamp-glow);
            transition: all 2s;
        }

        .road-line {
            position: absolute; top: 50%; left: 0; width: 200%; height: 2px;
            background: repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.4) 0px, rgba(255, 255, 255, 0.4) 30px, transparent 30px, transparent 60px);
            transform: translateY(-50%); animation: driveRoad 0.7s linear infinite;
        }
        @keyframes driveRoad { 100% { transform: translate3d(-60px, -50%, 0); } }

        .traffic-stream { position: absolute; top: 0; left: 0; right: 0; width: 100%; height: 100%; }
        .car {
            position: absolute; width: 24px; height: 10px; background: #151515; border-radius: 3px;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.3); will-change: transform;
        }
        .car-left-1 { top: 12px; animation: zoomLeft 3.5s linear infinite; }
        .car-left-1::before {
            content: ''; position: absolute; top: 2px; left: -35px; width: 35px; height: 6px;
            background: linear-gradient(90deg, transparent, rgba(0, 243, 255, 0.9)); border-radius: 50%;
        }
        .car-left-2 { top: 18px; animation: zoomLeft 2.2s linear infinite 1.5s; }
        .car-left-2::before {
            content: ''; position: absolute; top: 2px; left: -45px; width: 45px; height: 6px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.9));
        }
        .car-right-1 { bottom: 12px; animation: zoomRight 2.8s linear infinite 0.5s; }
        .car-right-1::after {
            content: ''; position: absolute; top: 2px; right: -25px; width: 25px; height: 6px;
            background: linear-gradient(-90deg, transparent, rgba(255, 0, 60, 0.9));
        }
        @keyframes zoomLeft { 0% { transform: translate3d(110vw, 0, 0); } 100% { transform: translate3d(-100px, 0, 0); } }
        @keyframes zoomRight { 0% { transform: translate3d(-100px, 0, 0); } 100% { transform: translate3d(110vw, 0, 0); } }

        /* --- HUD CONSOLE (GRID STACK FOR ZERO EMPTY BOXES) --- */
        .hud-box {
            position: relative; z-index: 10;
            width: 88%; max-width: 480px; min-height: clamp(200px, 25vh, 240px);
            background: rgba(4, 7, 12, 0.85);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.9), inset 0 0 20px rgba(0, 243, 255, 0.1);
            padding: clamp(16px, 4vw, 24px);
            display: grid;
            place-items: center;
            text-align: center;
        }

        .hud-step {
            grid-area: 1 / 1;
            width: 100%;
            opacity: 0;
            transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out;
            transform: translateY(8px);
            pointer-events: none;
        }

        .hud-step.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- TYPOGRAPHY & ANIMATIONS --- */
        .text-line { font-size: clamp(1rem, 3vw, 1.2rem); font-weight: bold; line-height: 1.6; margin: 4px 0; text-shadow: 0 2px 5px rgba(0,0,0,0.9); }
        .highlight-cyan { color: #00f3ff; text-shadow: 0 0 12px rgba(0,243,255,0.6); }
        .highlight-white { color: #ffffff; text-shadow: 0 0 10px rgba(255,255,255,0.8); }
        .highlight-gold { color: #ffd700; text-shadow: 0 0 12px rgba(255,215,0,0.6); }
        
        .name-primary { font-size: clamp(1.4rem, 4.5vw, 1.8rem); color: #ffffff; font-weight: 900; letter-spacing: 2px; }
        .name-secondary { font-size: clamp(0.95rem, 3vw, 1.2rem); color: #00f3ff; font-weight: bold; margin-top: 4px; }
        .role-title { font-size: clamp(0.85rem, 2.8vw, 1.1rem); color: #ffd700; font-weight: 800; margin-top: 10px; letter-spacing: 1.5px; text-transform: uppercase; }

        .city-exit { animation: fadeOut 0.8s forwards; }
        @keyframes fadeOut { 100% { opacity: 0; filter: blur(12px); transform: scale(1.15); } }
    </style>
</head>
<body class="theme-night" id="dynamic-body">

    <div class="sky-layer">
        <div class="stars"></div>
        <div class="celestial-body"></div>
        <div class="clouds"><div class="cloud cloud-1"></div><div class="cloud cloud-2"></div></div>
        <div class="airplane"></div>
    </div>

    <div class="city-skyline">
        <div class="building b1"></div><div class="building b2"></div><div class="building b3"></div><div class="building b4"></div><div class="building b5"></div>
    </div>

    <div class="highway">
        <div class="street-lamps"><div class="lamp"></div><div class="lamp"></div><div class="lamp"></div><div class="lamp"></div><div class="lamp"></div></div>
        <div class="road-line"></div>
        <div class="traffic-stream"><div class="car car-left-1"></div><div class="car car-left-2"></div><div class="car car-right-1"></div></div>
    </div>

    <div class="hud-box" id="hud">
        
        <div id="step-1" class="hud-step active">
            <div id="dynamic-time-greet" class="highlight-cyan" style="font-size: clamp(1.2rem, 4vw, 1.5rem); font-weight: bold;"></div>
        </div>

        <div id="step-2" class="hud-step">
            <div class="text-line" style="margin-bottom: 6px;">DATE: <span id="clock-date" class="highlight-white"></span></div>
            <div class="text-line">TIME: <span id="clock-time" class="highlight-white"></span></div>
        </div>

        <div id="step-3" class="hud-step">
            <div class="highlight-gold" style="font-size: clamp(1.2rem, 4vw, 1.5rem); font-weight: bold;">> Welcome Sir / Ma'am <</div>
        </div>

        <div id="step-4" class="hud-step">
            <div class="highlight-white" style="font-size: clamp(1.1rem, 3.5vw, 1.4rem); font-weight: 900; letter-spacing: 1px;">A STARK DEV</div>
            <div class="highlight-cyan" style="font-size: clamp(1.1rem, 3.5vw, 1.4rem); font-weight: 900; letter-spacing: 1px; margin-top: 6px;">CAREER PORTFOLIO</div>
        </div>
        
        <div id="step-5" class="hud-step">
            <div class="name-primary">JAYA KUMAR</div>
            <div class="name-secondary">( S JAYA KUMAR )</div>
            <div class="role-title">> A DEVELOPER <</div>
        </div>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            function runClockAndTheme() {
                const now = new Date();
                const days = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"];
                const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
                
                const dateEl = document.getElementById('clock-date');
                const timeEl = document.getElementById('clock-time');
                if (dateEl) dateEl.textContent = `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
                if (timeEl) timeEl.textContent = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')} IST`;

                const currentHour = now.getHours();
                const body = document.getElementById('dynamic-body');
                body.classList.remove('theme-day', 'theme-sunset', 'theme-night');

                let timeOfDay = "Evening";
                if (currentHour >= 6 && currentHour < 16) {
                    body.classList.add('theme-day');
                    timeOfDay = currentHour >= 12 ? "Afternoon" : "Morning";
                } else if (currentHour >= 16 && currentHour < 19) {
                    body.classList.add('theme-sunset');
                } else {
                    body.classList.add('theme-night');
                    if(currentHour >= 0 && currentHour < 6) timeOfDay = "Morning";
                }
                return timeOfDay;
            }

            let greetingTime = runClockAndTheme();
            setInterval(runClockAndTheme, 1000);
            
            document.getElementById('dynamic-time-greet').textContent = `> Good ${greetingTime} <`;

            const steps = [
                document.getElementById('step-1'),
                document.getElementById('step-2'),
                document.getElementById('step-3'),
                document.getElementById('step-4'),
                document.getElementById('step-5')
            ];

            function switchStep(fromIndex, toIndex) {
                steps[fromIndex].classList.remove('active');
                steps[toIndex].classList.add('active');
            }

            // --- 12-SECOND SMOOTH STACKED TIMELINE ---
            setTimeout(() => switchStep(0, 1), 2500); // 2.5s: Show Date & Time
            setTimeout(() => switchStep(1, 2), 5000); // 5.0s: Welcome Sir/Ma'am
            setTimeout(() => switchStep(2, 3), 7500); // 7.5s: Portfolio Title
            setTimeout(() => switchStep(3, 4), 9500); // 9.5s: Name & Identity

            // 11.3s: Trigger cinematic warp exit
            setTimeout(() => { document.body.classList.add('city-exit'); }, 11300);

            // 12.0s: Redirect to landing page
            setTimeout(() => { window.location.href = 'home.html'; }, 12000);
        });
    </script>
</body>
</html>
