<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Boot | Living City</title>
    <style>
        /* --- GLOBAL RESET & DYNAMIC THEME VARIABLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }
        
        :root {
            /* Night Theme Defaults */
            --sky-top: #03040e;
            --sky-bottom: #12102b;
            --celestial-color: #f4f6ff; 
            --celestial-shadow: 0 0 30px #f4f6ff, 0 0 80px rgba(244, 246, 255, 0.5);
            --building-bg: linear-gradient(to bottom, #060810 0%, #020305 100%);
            --window-color1: rgba(255, 215, 0, 0.85); /* Gold */
            --window-color2: rgba(0, 243, 255, 0.85); /* Cyan */
            --road-color: #050608;
            --cloud-opacity: 0.25;
            --traffic-opacity: 1;
        }

        body.theme-day {
            --sky-top: #209ced;
            --sky-bottom: #7dd0ff;
            --celestial-color: #FFD700; 
            --celestial-shadow: 0 0 50px #FFD700, 0 0 100px #FF8C00;
            --building-bg: linear-gradient(to bottom, #111a26 0%, #0a1017 100%);
            --window-color1: rgba(160, 200, 240, 0.4); 
            --window-color2: rgba(192, 224, 255, 0.4);
            --road-color: #151a22;
            --cloud-opacity: 0.9;
            --traffic-opacity: 0.3;
        }

        body.theme-sunset {
            --sky-top: #4a154b;
            --sky-bottom: #e64949;
            --celestial-color: #ff5e00; 
            --celestial-shadow: 0 0 50px #ff5e00, 0 0 90px #ff9d00;
            --building-bg: linear-gradient(to bottom, #170912 0%, #0a0408 100%);
            --window-color1: rgba(255, 174, 0, 0.7); 
            --window-color2: rgba(255, 81, 0, 0.7);
            --road-color: #0f090d;
            --cloud-opacity: 0.7;
            --traffic-opacity: 0.8;
        }

        body {
            background: linear-gradient(to bottom, var(--sky-top), var(--sky-bottom));
            color: #ffffff;
            overflow: hidden;
            height: 100dvh; /* Fixes mobile browser bar overlap */
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 15dvh; 
            position: relative;
            transition: background 2s ease-in-out;
        }

        /* --- SKY & CELESTIAL LAYER --- */
        .sky-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100%;
            z-index: 1;
            overflow: hidden;
        }

        .celestial-body {
            position: absolute;
            left: 50%;
            top: 12vh;
            transform: translateX(-50%);
            width: 70px; height: 70px;
            border-radius: 50%;
            background: var(--celestial-color);
            box-shadow: var(--celestial-shadow);
            transition: all 2s ease-in-out;
            z-index: 2;
        }

        /* Twinkling Stars */
        .stars {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            opacity: 0;
            transition: opacity 2s;
        }
        body.theme-night .stars { opacity: 1; }
        .stars::after {
            content: ''; position: absolute; width: 2px; height: 2px; background: transparent;
            box-shadow: 
                10vw 10vh #fff, 20vw 25vh #fff, 30vw 5vh #fff, 40vw 30vh #fff, 
                50vw 15vh #fff, 60vw 22vh #fff, 70vw 8vh #fff, 80vw 35vh #fff, 
                85vw 15vh #fff, 15vw 40vh #fff, 25vw 20vh #fff;
            animation: twinkle 4s infinite alternate;
        }

        @keyframes twinkle { 0% { opacity: 0.2; } 100% { opacity: 1; } }

        /* --- CITY SKYLINE (PROPER WINDOWS) --- */
        .city-skyline {
            position: absolute;
            bottom: 70px; /* Sits exactly on top of the 70px highway */
            left: 0;
            width: 100vw;
            height: 40vh;
            z-index: 4;
            pointer-events: none;
        }

        .building {
            position: absolute;
            bottom: 0;
            background: var(--building-bg);
            border-top: 1px solid rgba(255,255,255,0.1);
            border-right: 1px solid rgba(0,0,0,0.5);
            box-shadow: inset -5px 0 15px rgba(0,0,0,0.5);
        }

        /* Using radial gradients for tiny, spaced-out lit windows */
        .building::before {
            content: '';
            position: absolute;
            top: 10px; left: 0; right: 0; bottom: 10px;
            background-position: center top;
        }

        .b1 { left: 2vw; width: 15vw; height: 25vh; }
        .b1::before {
            background-image: radial-gradient(circle, var(--window-color1) 1.5px, transparent 2px);
            background-size: 14px 20px;
        }

        .b2 { left: 16vw; width: 22vw; height: 38vh; z-index: 5; }
        .b2::before {
            background-image: radial-gradient(circle, var(--window-color2) 1.5px, transparent 2px);
            background-size: 18px 24px;
        }

        .b3 { left: 35vw; width: 28vw; height: 28vh; }
        .b3::before {
            background-image: radial-gradient(circle, var(--window-color1) 1px, transparent 1.5px);
            background-size: 12px 18px;
        }

        .b4 { left: 60vw; width: 22vw; height: 42vh; z-index: 5; }
        .b4::before {
            background-image: radial-gradient(circle, var(--window-color2) 2px, transparent 2.5px);
            background-size: 20px 28px;
        }

        .b5 { left: 80vw; width: 18vw; height: 20vh; }
        .b5::before {
            background-image: radial-gradient(circle, var(--window-color1) 1.5px, transparent 2px);
            background-size: 16px 22px;
        }

        /* --- THE HIGHWAY & TRAFFIC --- */
        .highway {
            position: absolute;
            bottom: 0; left: 0;
            width: 100vw; height: 70px; /* Fixed height, stuck to absolute bottom */
            background: var(--road-color);
            border-top: 2px solid #1a1e29;
            box-shadow: 0 -15px 30px rgba(0,0,0,0.8);
            z-index: 6;
            overflow: hidden;
        }

        .road-line {
            position: absolute;
            top: 50%; left: 0;
            width: 200vw; height: 2px;
            background: repeating-linear-gradient(90deg, rgba(255, 215, 0, 0.6) 0px, rgba(255, 215, 0, 0.6) 30px, transparent 30px, transparent 60px);
            transform: translateY(-50%);
            animation: driveRoad 0.8s linear infinite;
        }

        @keyframes driveRoad { 100% { transform: translate3d(-60px, -50%, 0); } }

        .traffic-stream {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: var(--traffic-opacity);
        }

        .light-streak {
            position: absolute; height: 3px; border-radius: 3px;
            will-change: transform;
        }

        .headlight-1 {
            top: 25px; width: 60px;
            background: linear-gradient(90deg, transparent, #fff, #00f3ff);
            box-shadow: 0 0 8px #00f3ff;
            animation: zoomLeft 2.5s linear infinite;
        }
        .taillight-1 {
            bottom: 25px; width: 80px;
            background: linear-gradient(90deg, #ff003c, #ff5200, transparent);
            box-shadow: 0 0 8px #ff003c;
            animation: zoomRight 2s linear infinite 0.5s;
        }

        @keyframes zoomLeft { 0% { transform: translate3d(120vw, 0, 0); } 100% { transform: translate3d(-100px, 0, 0); } }
        @keyframes zoomRight { 0% { transform: translate3d(-100px, 0, 0); } 100% { transform: translate3d(120vw, 0, 0); } }

        /* --- HUD CONSOLE --- */
        .hud-box {
            position: relative;
            z-index: 10;
            width: 90%; max-width: 440px; min-height: 280px;
            background: rgba(6, 10, 18, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0, 243, 255, 0.1);
            padding: 24px 18px;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }

        .text-line { font-size: 1.1rem; font-weight: bold; line-height: 1.6; margin: 6px 0; text-shadow: 0 2px 5px rgba(0,0,0,0.9); }
        .highlight-cyan { color: #00f3ff; text-shadow: 0 0 10px rgba(0,243,255,0.6); }
        .highlight-white { color: #ffffff; text-shadow: 0 0 10px rgba(255,255,255,0.8); }
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.4s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .name-primary { font-size: 1.75rem; color: #ffffff; font-weight: 900; letter-spacing: 2px; }
        .name-secondary { font-size: 1.15rem; color: #00f3ff; font-weight: bold; }
        .aliases-wrapper { display: flex; justify-content: center; gap: 8px; margin: 8px 0; flex-wrap: wrap; }
        .tag { padding: 4px 12px; border: 1px solid rgba(255,255,255,0.5); background: rgba(255,255,255,0.1); color: #fff; font-size: 0.9rem; font-weight: bold; border-radius: 6px; }
        .tag-cyan { border-color: #00f3ff; background: rgba(0,243,255,0.15); color: #00f3ff; }
        .role-title { font-size: 1.05rem; color: #ffffff; font-weight: 800; margin-top: 8px; letter-spacing: 1.5px; text-transform: uppercase; }

        .city-exit { animation: fadeOut 0.8s forwards; }
        @keyframes fadeOut { 100% { opacity: 0; filter: blur(10px); transform: scale(1.1); } }
    </style>
</head>
<body class="theme-night" id="dynamic-body">

    <!-- Sky Layer -->
    <div class="sky-layer">
        <div class="stars"></div>
        <div class="celestial-body"></div>
    </div>

    <!-- City Skyline Layer -->
    <div class="city-skyline">
        <div class="building b1"></div>
        <div class="building b2"></div>
        <div class="building b3"></div>
        <div class="building b4"></div>
        <div class="building b5"></div>
    </div>

    <!-- Highway & Live Traffic -->
    <div class="highway">
        <div class="road-line"></div>
        <div class="traffic-stream">
            <div class="light-streak headlight-1"></div>
            <div class="light-streak taillight-1"></div>
        </div>
    </div>

    <!-- Glassmorphic HUD Console -->
    <div class="hud-box" id="hud">
        <div id="step-sync" class="text-line">
            <div class="highlight-cyan" style="font-size: 1.25rem; margin-bottom: 10px;">[ ENVIRONMENT SYNC ]</div>
            <div>> LOCAL TIME DETECTED...</div>
            <div style="margin-top: 8px;">DATE: <span id="clock-date" class="highlight-white"></span></div>
            <div>TIME: <span id="clock-time" class="highlight-white"></span></div>
        </div>
        <div id="step-greet" class="hidden text-line">
            <div class="highlight-white" style="font-size: 1.05rem; margin-bottom: 10px;">[ PRESENCE VERIFIED ]</div>
            <div id="dynamic-greeting" class="highlight-cyan" style="font-size: 1.2rem; line-height: 1.5;"></div>
        </div>
        <div id="step-identity" class="hidden" style="width: 100%; display: flex; flex-direction: column; gap: 6px;">
            <div class="name-primary">JAYA KUMAR</div>
            <div class="name-secondary">( S JAYA KUMAR )</div>
            <div class="aliases-wrapper">
                <span class="tag">STARK DEV</span>
                <span class="tag tag-cyan">JACK</span>
            </div>
            <div class="role-title">FULL-STACK DEVELOPER</div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            function runClockAndTheme() {
                const now = new Date();
                const days = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"];
                const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
                
                const dateEl = document.getElementById('clock-date');
                const timeEl = document.getElementById('clock-time');
                if (dateEl) dateEl.textContent = `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
                if (timeEl) timeEl.textContent = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')} IST`;

                const currentHour = now.getHours();
                const body = document.getElementById('dynamic-body');
                body.classList.remove('theme-day', 'theme-sunset', 'theme-night');

                let timeOfDay = "evening";
                if (currentHour >= 6 && currentHour < 16) {
                    body.classList.add('theme-day');
                    timeOfDay = currentHour >= 12 ? "afternoon" : "morning";
                } else if (currentHour >= 16 && currentHour < 19) {
                    body.classList.add('theme-sunset');
                } else {
                    body.classList.add('theme-night');
                    if(currentHour >= 0 && currentHour < 6) timeOfDay = "morning";
                }
                return timeOfDay;
            }

            let greetingTime = runClockAndTheme();
            setInterval(runClockAndTheme, 1000);
            document.getElementById('dynamic-greeting').textContent = `> Good ${greetingTime} and welcome to portfolio sir / ma'am.`;

            const stepSync = document.getElementById('step-sync');
            const stepGreet = document.getElementById('step-greet');
            const stepIdentity = document.getElementById('step-identity');

            setTimeout(() => { stepSync.classList.add('hidden'); stepGreet.classList.remove('hidden'); stepGreet.classList.add('fade-in'); }, 2500);
            setTimeout(() => { stepGreet.classList.add('hidden'); stepIdentity.classList.remove('hidden'); stepIdentity.classList.add('fade-in'); }, 4500);
            setTimeout(() => { document.body.classList.add('city-exit'); }, 6200);
            setTimeout(() => { window.location.href = 'home.html'; }, 7000);
        });
    </script>
</body>
</html>
