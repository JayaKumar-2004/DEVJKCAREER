<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Boot | Cinematic City</title>
    <style>
        /* --- GLOBAL RESET & DYNAMIC THEME VARIABLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }
        
        :root {
            /* Night Theme Defaults */
            --sky-top: #03040e;
            --sky-bottom: #12102b;
            --celestial-color: #f4f6ff; 
            --celestial-shadow: 0 0 40px #f4f6ff, 0 0 100px rgba(244, 246, 255, 0.5);
            --building-bg: linear-gradient(to bottom, #060810 0%, #020305 100%);
            --window-color1: rgba(255, 215, 0, 0.85); /* Gold */
            --window-color2: rgba(0, 243, 255, 0.85); /* Cyan */
            --gate-glow: rgba(255, 215, 0, 0.9);
            --road-color: #0b0c10;
            --lamp-glow: 0 0 15px #ffdd88, 0 0 30px #ffdd88;
            --lamp-bulb: #ffdd88;
            --cloud-opacity: 0.25;
            --star-opacity: 1;
        }

        /* Morning / Day Theme - LIGHTS OFF */
        body.theme-day {
            --sky-top: #209ced;
            --sky-bottom: #7dd0ff;
            --celestial-color: #FFD700; 
            --celestial-shadow: 0 0 60px #FFD700, 0 0 120px #FF8C00;
            --building-bg: linear-gradient(to bottom, #152233 0%, #0c1520 100%);
            /* Tinted dark daytime windows, NO glowing lights */
            --window-color1: rgba(30, 50, 70, 0.6); 
            --window-color2: rgba(25, 60, 80, 0.6);
            --gate-glow: rgba(40, 60, 80, 0.5);
            --road-color: #1a1e24;
            --lamp-glow: none;
            --lamp-bulb: #777777; /* Lamps turned off */
            --cloud-opacity: 0.9;
            --star-opacity: 0;
        }

        /* Sunset Theme - LIGHTS TURNING ON */
        body.theme-sunset {
            --sky-top: #3b123d;
            --sky-bottom: #d63c3c;
            --celestial-color: #ff6a00; 
            --celestial-shadow: 0 0 60px #ff6a00, 0 0 110px #ff9d00;
            --building-bg: linear-gradient(to bottom, #170912 0%, #0a0408 100%);
            --window-color1: rgba(255, 174, 0, 0.8); 
            --window-color2: rgba(255, 81, 0, 0.8);
            --gate-glow: rgba(255, 150, 0, 0.8);
            --road-color: #120a0e;
            --lamp-glow: 0 0 15px #ffaa00, 0 0 25px #ffaa00;
            --lamp-bulb: #ffaa00;
            --cloud-opacity: 0.7;
            --star-opacity: 0.3;
        }

        body {
            background: linear-gradient(to bottom, var(--sky-top), var(--sky-bottom));
            color: #ffffff;
            overflow: hidden;
            height: 100dvh; 
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 15dvh; 
            position: relative;
            transition: background 2s ease-in-out;
        }

        /* --- SKY, FLIGHTS & CELESTIAL LAYER --- */
        .sky-layer {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100%; z-index: 1; overflow: hidden;
        }

        .celestial-body {
            position: absolute; left: 50%; top: 12vh;
            transform: translateX(-50%);
            width: 75px; height: 75px;
            border-radius: 50%;
            background: var(--celestial-color);
            box-shadow: var(--celestial-shadow);
            z-index: 2;
        }

        /* Twinkling Stars */
        .stars {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: var(--star-opacity); transition: opacity 2s;
        }
        .stars::after {
            content: ''; position: absolute; width: 2px; height: 2px; background: transparent;
            box-shadow: 
                10vw 10vh #fff, 20vw 25vh #fff, 30vw 5vh #fff, 40vw 30vh #fff, 
                50vw 15vh #fff, 60vw 22vh #fff, 70vw 8vh #fff, 80vw 35vh #fff, 
                85vw 15vh #fff, 15vw 40vh #fff, 25vw 20vh #fff, 90vw 28vh #fff;
            animation: twinkle 4s infinite alternate;
        }
        @keyframes twinkle { 0% { opacity: 0.2; } 100% { opacity: 1; } }

        /* Drifting Clouds */
        .clouds {
            position: absolute; top: 10%; left: 0; width: 100vw; height: 30vh; z-index: 2; opacity: var(--cloud-opacity); pointer-events: none;
        }
        .cloud { position: absolute; background: #fff; border-radius: 50px; filter: blur(3px); }
        .cloud::before, .cloud::after { content: ''; position: absolute; background: #fff; border-radius: 50%; }
        .cloud-1 { top: 10%; width: 120px; height: 40px; animation: floatRight 55s linear infinite; }
        .cloud-1::before { width: 50px; height: 50px; top: -25px; left: 15px; }
        .cloud-1::after { width: 40px; height: 40px; top: -15px; left: 60px; }
        .cloud-2 { top: 50%; width: 90px; height: 30px; animation: floatLeft 45s linear infinite; }
        .cloud-2::before { width: 40px; height: 40px; top: -15px; left: 15px; }

        @keyframes floatRight { 0% { transform: translateX(-20vw); } 100% { transform: translateX(110vw); } }
        @keyframes floatLeft { 0% { transform: translateX(110vw); } 100% { transform: translateX(-20vw); } }

        /* Commercial Flight (Airplane) with Headlight & Nav Light */
        .airplane {
            position: absolute; top: 22vh; right: -50px;
            width: 28px; height: 8px;
            background: #333;
            border-radius: 50% 50% 50% 50% / 80% 80% 20% 20%;
            z-index: 3;
            animation: flyAcross 22s linear infinite;
        }
        .airplane::before { /* White Headlight Beam */
            content: ''; position: absolute; top: 2px; left: -20px;
            width: 20px; height: 4px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8));
            border-radius: 50%;
        }
        .airplane::after { /* Blinking Red Nav Light */
            content: ''; position: absolute; top: -3px; left: 12px;
            width: 4px; height: 4px;
            border-radius: 50%;
            background: red; box-shadow: 0 0 8px red;
            animation: blinkFast 0.8s infinite;
        }
        @keyframes flyAcross { 0% { transform: translateX(10vw) scale(0.8); } 100% { transform: translateX(-110vw) scale(1); } }
        @keyframes blinkFast { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }

        /* --- CITY SKYLINE & GATES FOR ALL BUILDINGS --- */
        .city-skyline {
            position: absolute; bottom: 70px; left: 0; width: 100vw; height: 45vh;
            z-index: 4; pointer-events: none;
        }

        .building {
            position: absolute; bottom: 0;
            background: var(--building-bg);
            border-top: 1px solid rgba(255,255,255,0.15);
            border-right: 1px solid rgba(0,0,0,0.6);
            box-shadow: inset -5px 0 15px rgba(0,0,0,0.5);
            transition: background 2s;
        }
        .building::before {
            content: ''; position: absolute; top: 10px; left: 0; right: 0; bottom: 15px;
            background-position: center top;
            transition: background-image 2s;
        }
        /* Entrance Gates for ALL buildings */
        .building::after {
            content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            height: 14px;
            background: var(--gate-glow);
            box-shadow: 0 0 10px var(--gate-glow);
            border-radius: 2px 2px 0 0;
            transition: all 2s;
        }

        .b1 { left: 0vw; width: 18vw; height: 26vh; }
        .b1::before { background-image: radial-gradient(circle, var(--window-color1) 1.5px, transparent 2px); background-size: 14px 20px; }
        .b1::after { width: 25px; }

        .b2 { left: 17vw; width: 22vw; height: 38vh; z-index: 5; }
        .b2::before { background-image: radial-gradient(circle, var(--window-color2) 1.5px, transparent 2px); background-size: 18px 24px; }
        .b2::after { width: 35px; height: 18px; }

        .b3 { left: 38vw; width: 26vw; height: 32vh; }
        .b3::before { background-image: radial-gradient(circle, var(--window-color1) 1px, transparent 1.5px); background-size: 12px 18px; }
        .b3::after { width: 45px; height: 22px; } /* Main center gate is largest */

        .b4 { left: 63vw; width: 20vw; height: 42vh; z-index: 5; }
        .b4::before { background-image: radial-gradient(circle, var(--window-color2) 2px, transparent 2.5px); background-size: 20px 28px; }
        .b4::after { width: 30px; height: 16px; }

        .b5 { left: 82vw; width: 18vw; height: 22vh; }
        .b5::before { background-image: radial-gradient(circle, var(--window-color1) 1.5px, transparent 2px); background-size: 16px 22px; }
        .b5::after { width: 20px; }

        /* --- THE HIGHWAY, LAMPS & ACTUAL VEHICLES --- */
        .highway {
            position: absolute; bottom: 0; left: 0; right: 0;
            width: 100vw; height: 70px; 
            background: var(--road-color);
            border-top: 2px solid #1a1e29;
            box-shadow: 0 -15px 30px rgba(0,0,0,0.9);
            z-index: 6; overflow: visible;
        }

        /* Street Lamps */
        .street-lamps {
            position: absolute; top: -40px; left: 0; width: 100%; height: 40px;
            display: flex; justify-content: space-around;
        }
        .lamp { position: relative; width: 3px; height: 100%; background: #222; }
        .lamp::before {
            content: ''; position: absolute; top: -5px; left: -3px;
            width: 9px; height: 9px; border-radius: 50%;
            background: var(--lamp-bulb); box-shadow: var(--lamp-glow);
            transition: all 2s;
        }

        /* Dashed Road Line */
        .road-line {
            position: absolute; top: 50%; left: 0; width: 200vw; height: 2px;
            background: repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.4) 0px, rgba(255, 255, 255, 0.4) 30px, transparent 30px, transparent 60px);
            transform: translateY(-50%);
            animation: driveRoad 0.7s linear infinite;
        }
        @keyframes driveRoad { 100% { transform: translate3d(-60px, -50%, 0); } }

        /* Actual Car Bodies with Light Beams */
        .traffic-stream { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .car {
            position: absolute; width: 26px; height: 12px;
            background: #151515; border-radius: 3px;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.3);
            will-change: transform;
        }

        .car-left-1 { top: 12px; animation: zoomLeft 3.5s linear infinite; }
        .car-left-1::before { /* Headlight Beam */
            content: ''; position: absolute; top: 2px; left: -35px;
            width: 35px; height: 8px;
            background: linear-gradient(90deg, transparent, rgba(0, 243, 255, 0.9));
            border-radius: 50%;
        }

        .car-left-2 { top: 18px; animation: zoomLeft 2.2s linear infinite 1.5s; }
        .car-left-2::before {
            content: ''; position: absolute; top: 2px; left: -45px;
            width: 45px; height: 8px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.9));
        }

        .car-right-1 { bottom: 12px; animation: zoomRight 2.8s linear infinite 0.5s; }
        .car-right-1::after { /* Red Taillight Glow */
            content: ''; position: absolute; top: 2px; right: -25px;
            width: 25px; height: 8px;
            background: linear-gradient(-90deg, transparent, rgba(255, 0, 60, 0.9));
        }

        @keyframes zoomLeft { 0% { transform: translate3d(110vw, 0, 0); } 100% { transform: translate3d(-100px, 0, 0); } }
        @keyframes zoomRight { 0% { transform: translate3d(-100px, 0, 0); } 100% { transform: translate3d(110vw, 0, 0); } }

        /* --- HUD CONSOLE (MINIMAL & FOCUSED) --- */
        .hud-box {
            position: relative; z-index: 10;
            width: 90%; max-width: 440px; min-height: 240px;
            background: rgba(4, 7, 12, 0.85);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.9), inset 0 0 20px rgba(0, 243, 255, 0.1);
            padding: 24px 20px;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }

        .text-line { font-size: 1.15rem; font-weight: bold; line-height: 1.6; margin: 4px 0; text-shadow: 0 2px 5px rgba(0,0,0,0.9); }
        .highlight-cyan { color: #00f3ff; text-shadow: 0 0 12px rgba(0,243,255,0.6); }
        .highlight-white { color: #ffffff; text-shadow: 0 0 10px rgba(255,255,255,0.8); }
        
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .name-primary { font-size: 1.8rem; color: #ffffff; font-weight: 900; letter-spacing: 2px; }
        .name-secondary { font-size: 1.2rem; color: #00f3ff; font-weight: bold; }
        .aliases-wrapper { display: flex; justify-content: center; gap: 8px; margin: 10px 0; flex-wrap: wrap; }
        .tag { padding: 4px 12px; border: 1px solid rgba(255,255,255,0.5); background: rgba(255,255,255,0.1); color: #fff; font-size: 0.95rem; font-weight: bold; border-radius: 4px; }
        .tag-cyan { border-color: #00f3ff; background: rgba(0,243,255,0.15); color: #00f3ff; }
        .role-title { font-size: 1.1rem; color: #ffffff; font-weight: 800; margin-top: 8px; letter-spacing: 1.5px; text-transform: uppercase; }

        .city-exit { animation: fadeOut 0.8s forwards; }
        @keyframes fadeOut { 100% { opacity: 0; filter: blur(12px); transform: scale(1.15); } }
    </style>
</head>
<body class="theme-night" id="dynamic-body">

    <div class="sky-layer">
        <div class="stars"></div>
        <div class="celestial-body"></div>
        <div class="clouds">
            <div class="cloud cloud-1"></div>
            <div class="cloud cloud-2"></div>
        </div>
        <div class="airplane"></div>
    </div>

    <div class="city-skyline">
        <div class="building b1"></div>
        <div class="building b2"></div>
        <div class="building b3"></div>
        <div class="building b4"></div>
        <div class="building b5"></div>
    </div>

    <div class="highway">
        <div class="street-lamps">
            <div class="lamp"></div><div class="lamp"></div><div class="lamp"></div><div class="lamp"></div><div class="lamp"></div>
        </div>
        <div class="road-line"></div>
        <div class="traffic-stream">
            <div class="car car-left-1"></div>
            <div class="car car-left-2"></div>
            <div class="car car-right-1"></div>
        </div>
    </div>

    <div class="hud-box" id="hud">
        
        <div id="step-greet" class="text-line fade-in">
            <div style="margin-bottom: 5px;">DATE: <span id="clock-date" class="highlight-white"></span></div>
            <div style="margin-bottom: 12px;">TIME: <span id="clock-time" class="highlight-white"></span></div>
            <div id="dynamic-greeting" class="highlight-cyan" style="font-size: 1.25rem; line-height: 1.4;"></div>
        </div>
        
        <div id="step-identity" class="hidden" style="width: 100%; display: flex; flex-direction: column; gap: 6px;">
            <div class="name-primary">JAYA KUMAR</div>
            <div class="name-secondary">( S JAYA KUMAR )</div>
            <div class="aliases-wrapper">
                <span class="tag">STARK DEV</span>
                <span class="tag tag-cyan">JACK</span>
            </div>
            <div class="role-title">FULL-STACK DEVELOPER</div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            function runClockAndTheme() {
                const now = new Date();
                const days = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"];
                const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
                
                const dateEl = document.getElementById('clock-date');
                const timeEl = document.getElementById('clock-time');
                if (dateEl) dateEl.textContent = `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
                if (timeEl) timeEl.textContent = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')} IST`;

                const currentHour = now.getHours();
                const body = document.getElementById('dynamic-body');
                body.classList.remove('theme-day', 'theme-sunset', 'theme-night');

                let timeOfDay = "evening";
                if (currentHour >= 6 && currentHour < 16) {
                    body.classList.add('theme-day');
                    timeOfDay = currentHour >= 12 ? "afternoon" : "morning";
                } else if (currentHour >= 16 && currentHour < 19) {
                    body.classList.add('theme-sunset');
                } else {
                    body.classList.add('theme-night');
                    if(currentHour >= 0 && currentHour < 6) timeOfDay = "morning";
                }
                return timeOfDay;
            }

            let greetingTime = runClockAndTheme();
            setInterval(runClockAndTheme, 1000);
            
            // Clean, direct greeting
            document.getElementById('dynamic-greeting').textContent = `> Good ${greetingTime} and welcome to portfolio sir / ma'am.`;

            const stepGreet = document.getElementById('step-greet');
            const stepIdentity = document.getElementById('step-identity');

            // Simplified 7-Second Sequence
            // 0s - 3.5s: Show Date, Time, and Greeting
            setTimeout(() => { 
                stepGreet.classList.add('hidden'); 
                stepIdentity.classList.remove('hidden'); 
                stepIdentity.classList.add('fade-in'); 
            }, 3500);

            // 6.2s: Trigger cinematic warp exit
            setTimeout(() => { document.body.classList.add('city-exit'); }, 6200);

            // 7.0s: Redirect to landing page
            setTimeout(() => { window.location.href = 'home.html'; }, 7000);
        });
    </script>
</body>
</html>
