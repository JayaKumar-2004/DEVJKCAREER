<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Boot | Living City</title>
    <style>
        /* --- GLOBAL RESET & DYNAMIC THEME VARIABLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }
        
        :root {
            /* Default: Night Theme */
            --sky-top: #020111;
            --sky-bottom: #140b2e;
            --celestial-color: #f4f6ff; /* Moon */
            --celestial-shadow: 0 0 40px #f4f6ff, 0 0 100px #f4f6ff;
            --celestial-y: 16vh;
            --building-color: #060810;
            --window-color1: #ffd700; /* Warm Gold Glow */
            --window-color2: #00f3ff; /* Cyberpunk Cyan Glow */
            --window-opacity: 0.85;
            --road-color: #08080a;
            --cloud-opacity: 0.25;
            --traffic-opacity: 1;
        }

        /* Morning / Day Theme */
        body.theme-day {
            --sky-top: #3aacf8;
            --sky-bottom: #9ae5ff;
            --celestial-color: #FFD700; /* Sun */
            --celestial-shadow: 0 0 60px #FFD700, 0 0 120px #FF8C00;
            --celestial-y: 12vh;
            --building-color: #122030;
            --window-color1: #a0c8f0; /* Tinted Daylight Glass */
            --window-color2: #c0e0ff;
            --window-opacity: 0.4;
            --road-color: #1c222c;
            --cloud-opacity: 0.85;
            --traffic-opacity: 0.4;
        }

        /* Sunset Theme */
        body.theme-sunset {
            --sky-top: #5e1358;
            --sky-bottom: #fa5252;
            --celestial-color: #FF4500; /* Setting Sun */
            --celestial-shadow: 0 0 50px #FF4500, 0 0 100px #FF8C00;
            --celestial-y: 50vh;
            --building-color: #180a14;
            --window-color1: #ffae00; /* Orange Evening Glow */
            --window-color2: #ff5200;
            --window-opacity: 0.7;
            --road-color: #120b10;
            --cloud-opacity: 0.65;
            --traffic-opacity: 0.8;
        }

        body {
            background: linear-gradient(to bottom, var(--sky-top), var(--sky-bottom));
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 10vh; /* Keeps HUD positioned cleanly in upper-middle sky */
            position: relative;
            transition: background 2s ease-in-out;
        }

        /* --- SKY & CELESTIAL LAYER --- */
        .sky-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1;
            overflow: hidden;
        }

        .celestial-body {
            position: absolute;
            left: 50%;
            top: var(--celestial-y);
            transform: translateX(-50%);
            width: 85px; height: 85px;
            border-radius: 50%;
            background: var(--celestial-color);
            box-shadow: var(--celestial-shadow);
            transition: all 2s ease-in-out;
            z-index: 2;
        }

        /* Twinkling Stars (Night Only) */
        .stars {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            opacity: 0;
            transition: opacity 2s;
        }
        body.theme-night .stars { opacity: 1; }
        
        .stars::after {
            content: '';
            position: absolute;
            width: 2px; height: 2px;
            background: transparent;
            box-shadow: 
                10vw 10vh #fff, 20vw 20vh #fff, 30vw 5vh #fff, 40vw 35vh #fff, 
                50vw 15vh #fff, 60vw 28vh #fff, 70vw 10vh #fff, 80vw 40vh #fff, 
                90vw 22vh #fff, 15vw 45vh #fff, 25vw 30vh #fff, 85vw 15vh #fff;
            animation: twinkle 3s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        /* Drifting Clouds */
        .clouds {
            position: absolute;
            top: 15%; left: 0; width: 200vw; height: 100%;
            z-index: 3;
            opacity: var(--cloud-opacity);
            transition: opacity 2s;
            pointer-events: none;
        }

        .cloud {
            position: absolute;
            background: #fff;
            border-radius: 50px;
            filter: blur(2px);
        }
        .cloud::before, .cloud::after { content: ''; position: absolute; background: #fff; border-radius: 50%; }

        .cloud-1 { top: 8%; width: 110px; height: 35px; animation: floatCloud 45s linear infinite; }
        .cloud-1::before { width: 45px; height: 45px; top: -20px; left: 15px; }
        .cloud-1::after { width: 35px; height: 35px; top: -10px; left: 55px; }

        .cloud-2 { top: 22%; width: 160px; height: 50px; animation: floatCloud 60s linear infinite reverse; }
        .cloud-2::before { width: 70px; height: 70px; top: -35px; left: 20px; }
        .cloud-2::after { width: 50px; height: 50px; top: -18px; left: 80px; }

        @keyframes floatCloud {
            0% { transform: translateX(-30vw); }
            100% { transform: translateX(120vw); }
        }

        /* --- CITY SKYLINE WITH LIT WINDOWS --- */
        .city-skyline {
            position: absolute;
            bottom: 11vh; /* Sits directly on top of the road */
            left: 0;
            width: 100vw;
            height: 45vh;
            z-index: 4;
            pointer-events: none;
        }

        .building {
            position: absolute;
            bottom: 0;
            background: var(--building-color);
            border-top: 2px solid rgba(255,255,255,0.15);
            transition: background 2s;
        }

        /* Building Window Grids using CSS linear gradients */
        .building::before {
            content: '';
            position: absolute;
            top: 8px; left: 6px; right: 6px; bottom: 8px;
            background-size: 8px 14px;
            opacity: var(--window-opacity);
            transition: opacity 2s;
        }

        /* Individual Building Shapes & Window Colors */
        .b1 { left: 2vw; width: 18vw; height: 28vh; }
        .b1::before {
            background-image: 
                linear-gradient(to right, var(--window-color1) 4px, transparent 4px),
                linear-gradient(to bottom, var(--window-color1) 8px, transparent 8px);
        }

        .b2 { left: 18vw; width: 22vw; height: 42vh; z-index: 5; }
        .b2::before {
            background-image: 
                linear-gradient(to right, var(--window-color2) 3px, transparent 3px),
                linear-gradient(to bottom, var(--window-color2) 10px, transparent 10px);
            background-size: 10px 18px;
        }

        .b3 { left: 38vw; width: 25vw; height: 32vh; }
        .b3::before {
            background-image: 
                linear-gradient(to right, var(--window-color1) 5px, transparent 5px),
                linear-gradient(to bottom, var(--window-color1) 6px, transparent 6px);
            background-size: 12px 14px;
        }

        .b4 { left: 60vw; width: 20vw; height: 46vh; z-index: 5; }
        .b4::before {
            background-image: 
                linear-gradient(to right, var(--window-color2) 4px, transparent 4px),
                linear-gradient(to bottom, var(--window-color2) 8px, transparent 8px);
        }

        .b5 { left: 78vw; width: 20vw; height: 24vh; }
        .b5::before {
            background-image: 
                linear-gradient(to right, var(--window-color1) 3px, transparent 3px),
                linear-gradient(to bottom, var(--window-color1) 6px, transparent 6px);
        }

        /* --- THE HIGHWAY & MOVING TRAFFIC --- */
        .highway {
            position: absolute;
            bottom: 0; left: 0;
            width: 100vw; height: 11vh;
            background: var(--road-color);
            border-top: 3px solid #2a2e3d;
            box-shadow: 0 -10px 25px rgba(0,0,0,0.8);
            z-index: 6;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        /* Dashed Road Centerline */
        .road-line {
            position: absolute;
            top: 50%; left: 0;
            width: 200vw; height: 3px;
            background: repeating-linear-gradient(90deg, #ffd700 0px, #ffd700 35px, transparent 35px, transparent 70px);
            transform: translateY(-50%);
            animation: driveRoad 0.6s linear infinite;
        }

        @keyframes driveRoad {
            0% { transform: translate3d(0, -50%, 0); }
            100% { transform: translate3d(-70px, -50%, 0); }
        }

        /* Moving Car Light Streaks */
        .traffic-stream {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: var(--traffic-opacity);
            transition: opacity 2s;
        }

        .light-streak {
            position: absolute;
            height: 4px;
            border-radius: 4px;
            filter: drop-shadow(0 0 6px currentColor);
            will-change: transform;
        }

        /* Headlights moving Right to Left */
        .headlight-1 {
            top: 25%; width: 70px;
            background: linear-gradient(90deg, transparent, #fff, #00f3ff);
            color: #00f3ff;
            animation: zoomLeft 2.2s linear infinite;
        }
        .headlight-2 {
            top: 35%; width: 100px;
            background: linear-gradient(90deg, transparent, #fff, #a8fffb);
            color: #fff;
            animation: zoomLeft 3.5s linear infinite 1s;
        }

        /* Red Taillights moving Left to Right */
        .taillight-1 {
            bottom: 30%; width: 90px;
            background: linear-gradient(90deg, #ff003c, #ff5200, transparent);
            color: #ff003c;
            animation: zoomRight 2.8s linear infinite 0.5s;
        }
        .taillight-2 {
            bottom: 20%; width: 60px;
            background: linear-gradient(90deg, #ff0055, #ff0000, transparent);
            color: #ff0000;
            animation: zoomRight 1.9s linear infinite 1.5s;
        }

        @keyframes zoomLeft {
            0% { transform: translate3d(110vw, 0, 0); }
            100% { transform: translate3d(-150px, 0, 0); }
        }
        @keyframes zoomRight {
            0% { transform: translate3d(-150px, 0, 0); }
            100% { transform: translate3d(110vw, 0, 0); }
        }

        /* --- GLASSMORPHIC HUD CONSOLE --- */
        .hud-box {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 440px;
            min-height: 310px;
            background: rgba(6, 10, 18, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7), inset 0 0 20px rgba(0, 243, 255, 0.1);
            padding: 24px 18px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* --- TYPOGRAPHY --- */
        .text-line {
            font-size: 1.1rem;
            font-weight: bold;
            line-height: 1.6;
            margin: 6px 0;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.9);
        }

        .highlight-cyan { color: #00f3ff; text-shadow: 0 0 10px rgba(0, 243, 255, 0.6); }
        .highlight-white { color: #ffffff; text-shadow: 0 0 10px rgba(255,255,255,0.8); }

        .hidden { display: none !important; }
        
        .fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* --- IDENTITY REVEAL --- */
        .identity-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .name-primary {
            font-size: 1.75rem;
            color: #ffffff;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.9);
        }

        .name-secondary {
            font-size: 1.15rem;
            color: #00f3ff;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .aliases-wrapper {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 8px 0;
            flex-wrap: wrap;
        }

        .tag {
            padding: 4px 12px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 0.9rem;
            font-weight: bold;
            letter-spacing: 1px;
            border-radius: 6px;
        }

        .tag-cyan {
            border-color: #00f3ff;
            background: rgba(0, 243, 255, 0.15);
            color: #00f3ff;
            box-shadow: 0 0 8px rgba(0, 243, 255, 0.4);
        }

        .role-title {
            font-size: 1.05rem;
            color: #ffffff;
            font-weight: 800;
            margin-top: 8px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* --- WARP EXIT ANIMATION --- */
        .city-exit {
            animation: fadeOut 0.8s forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; filter: brightness(1); }
            100% { opacity: 0; filter: brightness(4) blur(12px); transform: scale(1.1); }
        }
    </style>
</head>
<body class="theme-night" id="dynamic-body">

    <div class="sky-layer">
        <div class="stars"></div>
        <div class="celestial-body"></div>
        <div class="clouds">
            <div class="cloud cloud-1" style="left: -10vw;"></div>
            <div class="cloud cloud-2" style="left: 40vw;"></div>
        </div>
    </div>

    <div class="city-skyline">
        <div class="building b1"></div>
        <div class="building b2"></div>
        <div class="building b3"></div>
        <div class="building b4"></div>
        <div class="building b5"></div>
    </div>

    <div class="highway">
        <div class="road-line"></div>
        <div class="traffic-stream">
            <div class="light-streak headlight-1"></div>
            <div class="light-streak headlight-2"></div>
            <div class="light-streak taillight-1"></div>
            <div class="light-streak taillight-2"></div>
        </div>
    </div>

    <div class="hud-box" id="hud">
        
        <div id="step-sync" class="text-line">
            <div class="highlight-cyan" style="font-size: 1.25rem; margin-bottom: 10px;">[ ENVIRONMENT SYNC ]</div>
            <div>> LOCAL TIME DETECTED...</div>
            <div style="margin-top: 8px;">DATE: <span id="clock-date" class="highlight-white"></span></div>
            <div>TIME: <span id="clock-time" class="highlight-white"></span></div>
        </div>

        <div id="step-greet" class="hidden text-line">
            <div class="highlight-white" style="font-size: 1.05rem; margin-bottom: 10px;">[ PRESENCE VERIFIED ]</div>
            <div id="dynamic-greeting" class="highlight-cyan" style="font-size: 1.2rem; line-height: 1.5;"></div>
        </div>

        <div id="step-identity" class="hidden identity-container">
            <div class="name-primary">JAYA KUMAR</div>
            <div class="name-secondary">( S JAYA KUMAR )</div>
            
            <div class="aliases-wrapper">
                <span class="tag">STARK DEV</span>
                <span class="tag tag-cyan">JACK</span>
            </div>
            
            <div class="role-title">FULL-STACK DEVELOPER</div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            
            // 1. LIVE CLOCK, DATE, AND DYNAMIC THEME ENGINE
            function runClockAndTheme() {
                const now = new Date();
                const days = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"];
                const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
                
                const dateStr = `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
                
                const hrs = String(now.getHours()).padStart(2, '0');
                const mins = String(now.getMinutes()).padStart(2, '0');
                const secs = String(now.getSeconds()).padStart(2, '0');
                const timeStr = `${hrs}:${mins}:${secs} IST`;

                const dateEl = document.getElementById('clock-date');
                const timeEl = document.getElementById('clock-time');
                if (dateEl) dateEl.textContent = dateStr;
                if (timeEl) timeEl.textContent = timeStr;

                // Theme Logic Based on Hour
                const currentHour = now.getHours();
                const body = document.getElementById('dynamic-body');
                let timeOfDay = "evening";

                body.classList.remove('theme-day', 'theme-sunset', 'theme-night');

                if (currentHour >= 6 && currentHour < 16) {
                    body.classList.add('theme-day');
                    timeOfDay = "morning";
                    if (currentHour >= 12) timeOfDay = "afternoon";
                } 
                else if (currentHour >= 16 && currentHour < 19) {
                    body.classList.add('theme-sunset');
                    timeOfDay = "evening";
                } 
                else {
                    body.classList.add('theme-night');
                    timeOfDay = "evening";
                    if(currentHour >= 0 && currentHour < 6) timeOfDay = "morning";
                }

                return timeOfDay;
            }

            let greetingTime = runClockAndTheme();
            setInterval(runClockAndTheme, 1000);

            // Set dynamic greeting text
            const greetingString = `> Good ${greetingTime} and welcome to portfolio sir / ma'am.`;
            document.getElementById('dynamic-greeting').textContent = greetingString;

            // 3. EXACT 7-SECOND CHOREOGRAPHY
            const stepSync = document.getElementById('step-sync');
            const stepGreet = document.getElementById('step-greet');
            const stepIdentity = document.getElementById('step-identity');

            setTimeout(() => {
                stepSync.classList.add('hidden');
                stepGreet.classList.remove('hidden');
                stepGreet.classList.add('fade-in');
            }, 2500);

            setTimeout(() => {
                stepGreet.classList.add('hidden');
                stepIdentity.classList.remove('hidden');
                stepIdentity.classList.add('fade-in');
            }, 4500);

            setTimeout(() => {
                document.body.classList.add('city-exit');
            }, 6200);

            setTimeout(() => {
                window.location.href = 'home.html'; 
            }, 7000);
        });
    </script>
</body>
</html>
