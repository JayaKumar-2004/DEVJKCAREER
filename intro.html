<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Boot | Live Environment</title>
    <style>
        /* --- GLOBAL RESET & DYNAMIC THEME VARIABLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }
        
        :root {
            /* Default to Night Theme */
            --sky-top: #020111;
            --sky-bottom: #20124d;
            --celestial-color: #f4f6ff; /* Moon */
            --celestial-shadow: 0 0 40px #f4f6ff, 0 0 100px #f4f6ff;
            --celestial-y: 20vh;
            --landscape-color: #050510;
            --cloud-opacity: 0.3;
        }

        /* Morning / Day Theme */
        body.theme-day {
            --sky-top: #56CCF2;
            --sky-bottom: #2F80ED;
            --celestial-color: #FFD700; /* Sun */
            --celestial-shadow: 0 0 60px #FFD700, 0 0 120px #FF8C00;
            --celestial-y: 15vh;
            --landscape-color: #0c1e14;
            --cloud-opacity: 0.8;
        }

        /* Sunset Theme */
        body.theme-sunset {
            --sky-top: #8A2387;
            --sky-bottom: #E94057;
            --celestial-color: #FF512F; /* Setting Sun */
            --celestial-shadow: 0 0 50px #FF512F, 0 0 100px #F09819;
            --celestial-y: 55vh;
            --landscape-color: #1a0b12;
            --cloud-opacity: 0.6;
        }

        body {
            background: linear-gradient(to bottom, var(--sky-top), var(--sky-bottom));
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            transition: background 2s ease-in-out;
        }

        /* --- LIVE ENVIRONMENT LAYER --- */
        .environment-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            overflow: hidden;
        }

        /* Sun / Moon */
        .celestial-body {
            position: absolute;
            left: 50%;
            top: var(--celestial-y);
            transform: translateX(-50%);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--celestial-color);
            box-shadow: var(--celestial-shadow);
            transition: all 2s ease-in-out;
            z-index: 2;
        }

        /* Twinkling Stars (Only visible at night) */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 1;
            opacity: 0;
            transition: opacity 2s;
        }
        body.theme-night .stars { opacity: 1; }
        
        /* Generating random stars using box-shadow trick */
        .stars::after {
            content: '';
            position: absolute;
            width: 2px;
            height: 2px;
            background: transparent;
            box-shadow: 
                10vw 10vh #fff, 20vw 20vh #fff, 30vw 5vh #fff, 40vw 40vh #fff, 
                50vw 15vh #fff, 60vw 30vh #fff, 70vw 10vh #fff, 80vw 45vh #fff, 
                90vw 25vh #fff, 15vw 50vh #fff, 25vw 70vh #fff, 35vw 60vh #fff,
                45vw 80vh #fff, 65vw 65vh #fff, 75vw 85vh #fff, 85vw 75vh #fff;
            animation: twinkle 3s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        /* Moving Clouds (Pure CSS) */
        .clouds {
            position: absolute;
            top: 15%;
            left: 0;
            width: 200vw;
            height: 100%;
            z-index: 3;
            opacity: var(--cloud-opacity);
            transition: opacity 2s;
            pointer-events: none;
        }

        .cloud {
            position: absolute;
            background: #fff;
            border-radius: 50px;
            filter: blur(2px);
        }

        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: #fff;
            border-radius: 50%;
        }

        .cloud-1 {
            top: 10%; width: 120px; height: 40px;
            animation: floatCloud 45s linear infinite;
        }
        .cloud-1::before { width: 50px; height: 50px; top: -20px; left: 15px; }
        .cloud-1::after { width: 40px; height: 40px; top: -10px; left: 60px; }

        .cloud-2 {
            top: 25%; width: 180px; height: 60px;
            animation: floatCloud 60s linear infinite reverse;
        }
        .cloud-2::before { width: 80px; height: 80px; top: -40px; left: 20px; }
        .cloud-2::after { width: 60px; height: 60px; top: -20px; left: 90px; }

        .cloud-3 {
            top: 15%; width: 100px; height: 30px;
            animation: floatCloud 35s linear infinite;
        }
        .cloud-3::before { width: 40px; height: 40px; top: -15px; left: 15px; }
        .cloud-3::after { width: 30px; height: 30px; top: -10px; left: 45px; }

        @keyframes floatCloud {
            0% { transform: translateX(-20vw); }
            100% { transform: translateX(120vw); }
        }

        /* Landscape Silhouette (Vector Style) */
        .landscape-silhouette {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100vw;
            height: 35vh;
            z-index: 4;
            background: var(--landscape-color);
            transition: background 2s ease-in-out;
            clip-path: polygon(
                0% 100%, 100% 100%, 100% 60%, 
                85% 45%, 75% 65%, 60% 30%, 
                45% 55%, 30% 40%, 15% 70%, 0% 50%
            );
        }

        /* --- GLASSMORPHIC HUD CONSOLE --- */
        .hud-box {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 440px;
            min-height: 320px;
            background: rgba(4, 8, 14, 0.65); /* Dark adaptive glass */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 0 20px rgba(255,255,255,0.05);
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* --- TYPOGRAPHY --- */
        .text-line {
            font-size: 1.1rem;
            font-weight: bold;
            line-height: 1.6;
            margin: 6px 0;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.9);
        }

        .highlight-accent { color: #00f3ff; text-shadow: 0 0 10px rgba(0, 243, 255, 0.6); }
        .highlight-white { color: #ffffff; text-shadow: 0 0 10px rgba(255,255,255,0.8); }

        .hidden { display: none !important; }
        
        .fade-in {
            animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* --- IDENTITY REVEAL --- */
        .identity-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .name-primary {
            font-size: 1.8rem;
            color: #ffffff;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.9);
        }

        .name-secondary {
            font-size: 1.15rem;
            color: #00f3ff;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .aliases-wrapper {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 8px 0;
            flex-wrap: wrap;
        }

        .tag {
            padding: 4px 12px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 0.9rem;
            font-weight: bold;
            letter-spacing: 1px;
            border-radius: 6px;
        }

        .tag-accent {
            border-color: #00f3ff;
            background: rgba(0, 243, 255, 0.15);
            color: #00f3ff;
            box-shadow: 0 0 8px rgba(0, 243, 255, 0.4);
        }

        .role-title {
            font-size: 1.05rem;
            color: #ffffff;
            font-weight: 800;
            margin-top: 10px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* --- ENVIRONMENTAL FADEOUT EXIT ANIMATION --- */
        .environment-exit {
            animation: fadeOut 0.8s forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; filter: brightness(1); }
            100% { opacity: 0; filter: brightness(3) blur(10px); transform: scale(1.1); }
        }
    </style>
</head>
<body class="theme-night" id="dynamic-body"> <!-- Default, replaced by JS -->

    <!-- Live Environment Elements -->
    <div class="environment-wrapper">
        <div class="stars"></div>
        <div class="celestial-body"></div>
        
        <div class="clouds">
            <div class="cloud cloud-1" style="left: -10vw;"></div>
            <div class="cloud cloud-2" style="left: 40vw;"></div>
            <div class="cloud cloud-3" style="left: 80vw;"></div>
        </div>

        <div class="landscape-silhouette"></div>
    </div>

    <!-- Glassmorphic HUD Console -->
    <div class="hud-box" id="hud">
        
        <!-- Step 1: Network & Time Sync -->
        <div id="step-sync" class="text-line">
            <div class="highlight-accent" style="font-size: 1.25rem; margin-bottom: 10px;">[ ENVIRONMENT SYNC ]</div>
            <div>> LOCAL TIME DETECTED...</div>
            <div style="margin-top: 8px;">DATE: <span id="clock-date" class="highlight-white"></span></div>
            <div>TIME: <span id="clock-time" class="highlight-white"></span></div>
        </div>

        <!-- Step 2: Personalized AI Greeting -->
        <div id="step-greet" class="hidden text-line">
            <div class="highlight-white" style="font-size: 1.05rem; margin-bottom: 10px;">[ PRESENCE VERIFIED ]</div>
            <div id="dynamic-greeting" class="highlight-accent" style="font-size: 1.2rem; line-height: 1.5;"></div>
        </div>

        <!-- Step 3: Grand Name & Identity Reveal -->
        <div id="step-identity" class="hidden identity-container">
            <div class="name-primary">JAYA KUMAR</div>
            <div class="name-secondary">( S JAYA KUMAR )</div>
            
            <div class="aliases-wrapper">
                <span class="tag">STARK DEV</span>
                <span class="tag tag-accent">JACK</span>
            </div>
            
            <div class="role-title">FULL-STACK DEVELOPER</div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            
            // 1. LIVE CLOCK, DATE, AND DYNAMIC THEME ENGINE
            function runClockAndTheme() {
                const now = new Date();
                const days = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"];
                const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
                
                const dateStr = `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
                
                const hrs = String(now.getHours()).padStart(2, '0');
                const mins = String(now.getMinutes()).padStart(2, '0');
                const secs = String(now.getSeconds()).padStart(2, '0');
                const timeStr = `${hrs}:${mins}:${secs} IST`;

                const dateEl = document.getElementById('clock-date');
                const timeEl = document.getElementById('clock-time');
                if (dateEl) dateEl.textContent = dateStr;
                if (timeEl) timeEl.textContent = timeStr;

                // Theme Logic Based on Hour
                const currentHour = now.getHours();
                const body = document.getElementById('dynamic-body');
                let timeOfDay = "evening";

                body.classList.remove('theme-day', 'theme-sunset', 'theme-night');

                if (currentHour >= 6 && currentHour < 16) {
                    // 6 AM to 4 PM: Bright Day
                    body.classList.add('theme-day');
                    timeOfDay = "morning";
                    if (currentHour >= 12) timeOfDay = "afternoon";
                } 
                else if (currentHour >= 16 && currentHour < 19) {
                    // 4 PM to 7 PM: Golden Hour Sunset
                    body.classList.add('theme-sunset');
                    timeOfDay = "evening";
                } 
                else {
                    // 7 PM to 6 AM: Night time
                    body.classList.add('theme-night');
                    timeOfDay = "evening";
                    if(currentHour >= 0 && currentHour < 6) timeOfDay = "morning"; // Late night/early morning
                }

                return timeOfDay;
            }

            // Set initial theme and clock, then update every second
            let greetingTime = runClockAndTheme();
            setInterval(runClockAndTheme, 1000);

            // Set dynamic greeting text
            const greetingString = `> Good ${greetingTime} and welcome to portfolio sir / ma'am.`;
            document.getElementById('dynamic-greeting').textContent = greetingString;

            // 3. EXACT 7-SECOND CHOREOGRAPHY
            const stepSync = document.getElementById('step-sync');
            const stepGreet = document.getElementById('step-greet');
            const stepIdentity = document.getElementById('step-identity');

            // 0.0s to 2.5s: Time & Environment Sync displays
            
            // 2.5s to 4.5s: Dynamic Greeting
            setTimeout(() => {
                stepSync.classList.add('hidden');
                stepGreet.classList.remove('hidden');
                stepGreet.classList.add('fade-in');
            }, 2500);

            // 4.5s to 6.2s: Grand Name & Identity Reveal
            setTimeout(() => {
                stepGreet.classList.add('hidden');
                stepIdentity.classList.remove('hidden');
                stepIdentity.classList.add('fade-in');
            }, 4500);

            // 6.2s to 7.0s: Environmental Fadeout Transition
            setTimeout(() => {
                document.body.classList.add('environment-exit');
            }, 6200);

            // 7.0s: Automatic Redirect to Main Landing Page
            setTimeout(() => {
                window.location.href = 'home.html'; 
            }, 7000);
        });
    </script>
</body>
</html>
