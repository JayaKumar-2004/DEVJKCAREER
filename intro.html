<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stark Dev | Living Command Bridge</title>
    <style>
        /* --- GLOBAL RESET & THEME VARIABLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }
        
        :root {
            /* Night / Cyber-Sci-Fi Default (Matches Screenshot) */
            --sky-top: #01040a;
            --sky-bottom: #061325;
            --planet-glow: 0 0 50px rgba(0, 243, 255, 0.4), inset -10px -10px 30px rgba(0, 0, 0, 0.8);
            --building-bg: linear-gradient(to bottom, #040914 0%, #010307 100%);
            --win-cyan: rgba(0, 243, 255, 0.85);
            --win-gold: rgba(255, 183, 0, 0.85);
            --podium-glow: rgba(0, 243, 255, 0.6);
            --spore-color: #00f3ff;
            --road-bg: #030710;
            --hud-bg: rgba(3, 10, 20, 0.75);
            --hud-border: rgba(0, 243, 255, 0.45);
            --text-glow-cyan: 0 0 15px rgba(0, 243, 255, 0.8);
            --text-glow-gold: 0 0 15px rgba(255, 183, 0, 0.8);
        }

        /* Day Theme - Solarpunk Bright */
        body.theme-day {
            --sky-top: #1a75cf;
            --sky-bottom: #65b8ff;
            --planet-glow: 0 0 60px rgba(255, 255, 255, 0.8), inset -10px -10px 30px rgba(20, 50, 100, 0.5);
            --building-bg: linear-gradient(to bottom, #10243d 0%, #081424 100%);
            --win-cyan: rgba(180, 230, 255, 0.6);
            --win-gold: rgba(255, 220, 150, 0.6);
            --podium-glow: rgba(0, 180, 255, 0.8);
            --spore-color: #ffffff;
            --road-bg: #0c1828;
            --hud-bg: rgba(10, 25, 45, 0.7);
            --hud-border: rgba(100, 210, 255, 0.6);
        }

        /* Sunset Theme - Crimson & Gold Tech */
        body.theme-sunset {
            --sky-top: #2b0824;
            --sky-bottom: #9e2a2b;
            --planet-glow: 0 0 50px rgba(255, 100, 50, 0.6), inset -10px -10px 30px rgba(30, 0, 10, 0.8);
            --building-bg: linear-gradient(to bottom, #1c0915 0%, #0a0307 100%);
            --win-cyan: rgba(255, 130, 0, 0.85);
            --win-gold: rgba(255, 50, 80, 0.85);
            --podium-glow: rgba(255, 110, 0, 0.7);
            --spore-color: #ffaa00;
            --road-bg: #10050a;
            --hud-bg: rgba(20, 5, 15, 0.75);
            --hud-border: rgba(255, 120, 0, 0.5);
        }

        body {
            background: linear-gradient(to bottom, var(--sky-top), var(--sky-bottom));
            color: #ffffff;
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            transition: background 2s ease-in-out;
        }

        /* --- DEEP SPACE & SKY LAYER --- */
        .sky-layer {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            z-index: 1; pointer-events: none;
        }

        .stars {
            position: absolute; width: 100%; height: 100%;
            background-image: 
                radial-gradient(1px 1px at 10% 15%, #fff 50%, transparent),
                radial-gradient(1px 1px at 25% 40%, #fff 50%, transparent),
                radial-gradient(1.5px 1.5px at 45% 20%, #00f3ff 50%, transparent),
                radial-gradient(1px 1px at 65% 10%, #fff 50%, transparent),
                radial-gradient(2px 2px at 80% 30%, #ffcf00 50%, transparent),
                radial-gradient(1px 1px at 90% 60%, #fff 50%, transparent);
            background-size: 550px 550px;
            animation: twinkle 5s infinite alternate;
        }
        @keyframes twinkle { 0% { opacity: 0.3; } 100% { opacity: 1; } }

        /* Ringed Planet (Right side as in image) */
        .ringed-planet {
            position: absolute; top: 15vh; right: 8vw;
            width: clamp(70px, 10vw, 120px); height: clamp(70px, 10vw, 120px);
            border-radius: 50%;
            background: linear-gradient(135deg, #1f4267, #081321);
            box-shadow: var(--planet-glow);
            transform: rotate(-15deg);
            transition: all 2s;
        }
        .ringed-planet::after {
            content: ''; position: absolute; top: 50%; left: -30%;
            width: 160%; height: 20px;
            border: 4px solid rgba(0, 243, 255, 0.5);
            border-radius: 50%;
            transform: translateY(-50%) rotate(25deg);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
        }

        /* --- CITY SKYLINE & HIGHWAY --- */
        .cityscape {
            position: absolute; bottom: 18vh; left: 0; width: 100%; height: 35vh;
            display: flex; align-items: flex-end; justify-content: space-between;
            z-index: 2; pointer-events: none; opacity: 0.85;
        }

        .building {
            flex: 1; height: 100%; background: var(--building-bg);
            border-top: 1px solid rgba(0, 243, 255, 0.2);
            border-right: 1px solid rgba(0,0,0,0.8);
            position: relative; transition: background 2s;
        }
        .building::before {
            content: ''; position: absolute; top: 10px; left: 0; right: 0; bottom: 0;
            background-position: top center;
        }
        .b1 { height: 60%; } .b1::before { background: radial-gradient(circle, var(--win-cyan) 1px, transparent 1.5px) 0 0 / 12px 18px; }
        .b2 { height: 85%; } .b2::before { background: radial-gradient(circle, var(--win-gold) 1.5px, transparent 2px) 0 0 / 16px 22px; }
        .b3 { height: 45%; } .b3::before { background: radial-gradient(circle, var(--win-cyan) 1px, transparent 1.5px) 0 0 / 10px 15px; }
        .b4 { height: 95%; } .b4::before { background: radial-gradient(circle, var(--win-gold) 1.5px, transparent 2px) 0 0 / 18px 26px; }
        .b5 { height: 70%; } .b5::before { background: radial-gradient(circle, var(--win-cyan) 1px, transparent 1.5px) 0 0 / 14px 20px; }

        .highway {
            position: absolute; bottom: 12vh; left: 0; width: 100%; height: 6vh;
            background: var(--road-bg);
            border-top: 1px solid rgba(0, 243, 255, 0.3);
            border-bottom: 1px solid rgba(0, 243, 255, 0.3);
            z-index: 3; overflow: hidden;
            display: flex; align-items: center;
        }
        .car-stream {
            position: absolute; width: 100%; height: 2px;
            background: repeating-linear-gradient(90deg, transparent 0, transparent 100px, var(--win-cyan) 100px, var(--win-cyan) 140px, var(--win-gold) 200px, var(--win-gold) 220px);
            animation: traffic 3s linear infinite;
        }
        @keyframes traffic { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* --- SCI-FI BIO-TECH FOREGROUND (THE BRIDGE) --- */
        .bio-frame {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 4; pointer-events: none;
            display: flex; justify-content: space-between;
        }

        /* Cybernetic / Neural Pillars on side */
        .pillar {
            width: clamp(40px, 8vw, 100px); height: 100%;
            background: linear-gradient(to side, #02060d, rgba(2, 6, 13, 0.2));
            position: relative;
            border-right: 2px solid rgba(0, 243, 255, 0.2);
            box-shadow: inset -10px 0 20px rgba(0, 243, 255, 0.1);
        }
        .pillar.right {
            border-right: none; border-left: 2px solid rgba(0, 243, 255, 0.2);
            box-shadow: inset 10px 0 20px rgba(0, 243, 255, 0.1);
        }

        /* Glowing Neural Nodes on Pillars */
        .pillar::before, .pillar::after {
            content: ''; position: absolute; width: 6px; height: 30%;
            background: var(--podium-glow);
            border-radius: 4px; box-shadow: 0 0 15px var(--podium-glow);
            left: 10px; top: 20%;
            animation: pulseNode 3s infinite alternate;
        }
        .pillar::after { top: 65%; height: 20%; animation-delay: 1.5s; }
        @keyframes pulseNode { 0% { opacity: 0.3; } 100% { opacity: 1; } }

        /* --- 3D HOLOGRAPHIC PODIUM & LIVING ECOSYSTEM --- */
        .podium-container {
            position: absolute; bottom: -5vh; left: 50%;
            transform: translateX(-50%);
            width: clamp(300px, 60vw, 700px); height: 25vh;
            z-index: 5; display: flex; justify-content: center; align-items: center;
            perspective: 600px;
        }

        .holo-ring {
            position: absolute; border-radius: 50%;
            border: 2px solid var(--podium-glow);
            box-shadow: 0 0 20px var(--podium-glow), inset 0 0 20px var(--podium-glow);
            transform: rotateX(75deg);
            animation: spinRing 12s linear infinite;
        }
        .ring-1 { width: 100%; height: 100%; border-dasharray: 20px; border-style: dashed; }
        .ring-2 { width: 75%; height: 75%; border-color: rgba(255, 183, 0, 0.6); animation-direction: reverse; animation-duration: 8s; }
        .ring-3 { width: 45%; height: 45%; background: radial-gradient(circle, rgba(0, 243, 255, 0.2) 0%, transparent 70%); }

        @keyframes spinRing { 0% { transform: rotateX(75deg) rotateZ(0deg); } 100% { transform: rotateX(75deg) rotateZ(360deg); } }

        /* Floating Bioluminescent Spores */
        .spores {
            position: absolute; bottom: 0; width: 100%; height: 100%;
            z-index: 6; pointer-events: none; overflow: hidden;
        }
        .spore {
            position: absolute; bottom: -10px;
            width: 4px; height: 4px; border-radius: 50%;
            background: var(--spore-color);
            box-shadow: 0 0 10px var(--spore-color), 0 0 20px var(--spore-color);
            animation: floatUp 4s infinite linear;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-40vh) scale(1.2); opacity: 0; }
        }

        /* --- STARK HUD CONSOLE (CENTER STAGE) --- */
        .hud-console {
            position: relative; z-index: 10;
            width: 88%; max-width: 540px; min-height: 260px;
            background: var(--hud-bg);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--hud-border);
            /* Sci-fi Angled Corners */
            clip-path: polygon(0 0, 92% 0, 100% 15%, 100% 100%, 8% 100%, 0 85%);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 30px rgba(0, 243, 255, 0.15);
            padding: clamp(20px, 5vw, 35px);
            display: grid; place-items: center; text-align: center;
        }

        /* Corner Decorative Tech Lines */
        .hud-console::before, .hud-console::after {
            content: ''; position: absolute; width: 20px; height: 20px;
            border: 2px solid #00f3ff; pointer-events: none;
        }
        .hud-console::before { top: 10px; left: 10px; border-right: none; border-bottom: none; }
        .hud-console::after { bottom: 10px; right: 10px; border-left: none; border-top: none; }

        .hud-step {
            grid-area: 1 / 1; width: 100%; opacity: 0;
            transform: scale(0.95) translateY(10px);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }
        .hud-step.active {
            opacity: 1; transform: scale(1) translateY(0);
        }

        /* --- TYPOGRAPHY & STYLES --- */
        .text-line { font-size: clamp(1rem, 3vw, 1.15rem); font-weight: bold; margin: 6px 0; letter-spacing: 1px; }
        .glow-cyan { color: #00f3ff; text-shadow: var(--text-glow-cyan); }
        .glow-gold { color: #ffca00; text-shadow: var(--text-glow-gold); }
        .glow-white { color: #ffffff; text-shadow: 0 0 10px rgba(255,255,255,0.8); }
        
        .title-main { font-size: clamp(1.4rem, 4.5vw, 1.9rem); font-weight: 900; letter-spacing: 3px; }
        .title-sub { font-size: clamp(1.1rem, 3.5vw, 1.4rem); letter-spacing: 2px; margin-top: 4px; }
        .name-highlight { font-size: clamp(1.5rem, 5vw, 2.2rem); font-weight: 900; letter-spacing: 2px; color: #fff; }
        
        /* Warp Exit Animation */
        .warp-speed { animation: warpOut 0.8s forwards ease-in; }
        @keyframes warpOut {
            100% { opacity: 0; transform: scale(1.4); filter: blur(20px); }
        }
    </style>
</head>
<body class="theme-night" id="body-theme">

    <div class="sky-layer">
        <div class="stars"></div>
        <div class="ringed-planet"></div>
    </div>

    <div class="cityscape">
        <div class="building b1"></div><div class="building b2"></div>
        <div class="building b3"></div><div class="building b4"></div>
        <div class="building b5"></div>
    </div>
    <div class="highway"><div class="car-stream"></div></div>

    <div class="bio-frame">
        <div class="pillar left"></div>
        <div class="pillar right"></div>
    </div>

    <div class="podium-container">
        <div class="holo-ring ring-1"></div>
        <div class="holo-ring ring-2"></div>
        <div class="holo-ring ring-3"></div>
    </div>
    
    <div class="spores" id="spore-container"></div>

    <div class="hud-console">
        
        <div id="step-1" class="hud-step active">
            <div id="live-greeting" class="glow-cyan title-main">> Good Evening <</div>
        </div>

        <div id="step-2" class="hud-step">
            <div class="text-line">DATE: <span id="clock-date" class="glow-white"></span></div>
            <div class="text-line">TIME: <span id="clock-time" class="glow-white"></span></div>
        </div>

        <div id="step-3" class="hud-step">
            <div class="glow-gold title-main">> Welcome Sir / Ma'am <</div>
        </div>

        <div id="step-4" class="hud-step">
            <div class="glow-white title-main">A STARK DEV</div>
            <div class="glow-cyan title-sub font-weight-bold">CAREER PORTFOLIO</div>
        </div>
        
        <div id="step-5" class="hud-step">
            <div class="name-highlight glow-white">JAYA KUMAR</div>
            <div class="glow-cyan text-line">( S JAYA KUMAR )</div>
            <div class="glow-gold text-line" style="margin-top: 12px;">> A DEVELOPER <</div>
        </div>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // 1. Generate Bioluminescent Spores dynamically
            const sporeContainer = document.getElementById('spore-container');
            for (let i = 0; i < 25; i++) {
                let spore = document.createElement('div');
                spore.className = 'spore';
                spore.style.left = `${Math.random() * 100}%`;
                spore.style.animationDelay = `${Math.random() * 4}s`;
                spore.style.animationDuration = `${3 + Math.random() * 3}s`;
                sporeContainer.appendChild(spore);
            }

            // 2. Real-Time Clock & Dynamic Living Theme Switcher
            function updateSystem() {
                const now = new Date();
                const days = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"];
                const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
                
                const dateEl = document.getElementById('clock-date');
                const timeEl = document.getElementById('clock-time');
                if (dateEl) dateEl.textContent = `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
                if (timeEl) timeEl.textContent = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')} IST`;

                const hour = now.getHours();
                const body = document.getElementById('body-theme');
                body.classList.remove('theme-day', 'theme-sunset', 'theme-night');

                let timeText = "Evening";
                if (hour >= 6 && hour < 16) {
                    body.classList.add('theme-day');
                    timeText = hour >= 12 ? "Afternoon" : "Morning";
                } else if (hour >= 16 && hour < 19) {
                    body.classList.add('theme-sunset');
                } else {
                    body.classList.add('theme-night');
                    if(hour >= 0 && hour < 6) timeText = "Morning";
                }
                return timeText;
            }

            let currentGreet = updateSystem();
            setInterval(updateSystem, 1000);
            document.getElementById('live-greeting').textContent = `> Good ${currentGreet} <`;

            // 3. Sequential HUD Timeline (Smooth 12-Second Flow)
            const steps = [
                document.getElementById('step-1'),
                document.getElementById('step-2'),
                document.getElementById('step-3'),
                document.getElementById('step-4'),
                document.getElementById('step-5')
            ];

            function switchStep(from, to) {
                steps[from].classList.remove('active');
                steps[to].classList.add('active');
            }

            setTimeout(() => switchStep(0, 1), 2400); // 2.4s: Show Date/Time
            setTimeout(() => switchStep(1, 2), 4800); // 4.8s: Welcome Sir/Ma'am
            setTimeout(() => switchStep(2, 3), 7200); // 7.2s: Stark Dev Portfolio
            setTimeout(() => switchStep(3, 4), 9300); // 9.3s: Jaya Kumar Identity

            // 11.2s: Trigger Warp Drive Exit Animation
            setTimeout(() => { document.body.classList.add('warp-speed'); }, 11200);

            // 12.0s: Redirect to Home Page
            setTimeout(() => { window.location.href = 'home.html'; }, 12000);
        });
    </script>
</body>
</html>
