<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Boot | Jaya Kumar</title>
    <style>
        /* --- GLOBAL RESET & THEME --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }
        
        body {
            background-color: #020408;
            color: #00f3ff;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* --- 3D NEON CORRIDOR & HORIZON LIGHTING --- */
        .viewport-3d {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            perspective: 600px;
            z-index: 1;
            overflow: hidden;
        }

        /* Glowing center horizon glow */
        .horizon-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150vw;
            height: 20vh;
            background: radial-gradient(ellipse at center, rgba(255, 0, 60, 0.3) 0%, rgba(0, 243, 255, 0.15) 40%, transparent 80%);
            filter: blur(20px);
            z-index: 2;
        }

        .grid-floor, .grid-ceiling {
            position: absolute;
            width: 200vw;
            height: 100vh;
            left: -50vw;
            background-size: 40px 40px;
            animation: gridMove 2s linear infinite;
        }

        .grid-floor {
            bottom: -30vh;
            transform: rotateX(75deg);
            background-image: 
                linear-gradient(to right, rgba(255, 0, 60, 0.4) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 0, 60, 0.4) 1px, transparent 1px);
            box-shadow: inset 0 0 120px #020408;
        }

        .grid-ceiling {
            top: -30vh;
            transform: rotateX(-75deg);
            background-image: 
                linear-gradient(to right, rgba(0, 243, 255, 0.3) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 243, 255, 0.3) 1px, transparent 1px);
            box-shadow: inset 0 0 120px #020408;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 0 40px; }
        }

        /* --- ADVANCED HUD PANEL (MOBILE OPTIMIZED) --- */
        .hud-box {
            position: relative;
            z-index: 10;
            width: 92%;
            max-width: 480px;
            min-height: 380px;
            background: rgba(4, 8, 14, 0.85);
            border: 2px solid #00f3ff;
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.3), inset 0 0 25px rgba(0, 243, 255, 0.2);
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            clip-path: polygon(15px 0, calc(100% - 15px) 0, 100% 15px, 100% calc(100% - 15px), calc(100% - 15px) 100%, 15px 100%, 0 calc(100% - 15px), 0 15px);
        }

        /* Animated corner accents */
        .hud-box::before, .hud-box::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border-color: #ff003c;
            border-style: solid;
            transition: all 0.3s;
        }
        .hud-box::before { top: 8px; left: 8px; border-width: 2px 0 0 2px; }
        .hud-box::after { bottom: 8px; right: 8px; border-width: 0 2px 2px 0; }

        /* Scanning Laser Line */
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, #ff003c, #00f3ff, transparent);
            opacity: 0.7;
            animation: scan 3s ease-in-out infinite alternate;
        }

        @keyframes scan {
            0% { top: 5%; }
            100% { top: 90%; }
        }

        /* --- 3D SPINNING CORE --- */
        .loader-ring {
            width: 70px;
            height: 70px;
            border: 3px solid transparent;
            border-top: 3px solid #00f3ff;
            border-bottom: 3px solid #ff003c;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.5);
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- TYPOGRAPHY (LARGE FOR MOBILE) --- */
        .text-line {
            font-size: 1.15rem;
            font-weight: bold;
            line-height: 1.6;
            margin: 6px 0;
            text-shadow: 0 0 8px rgba(0, 243, 255, 0.8);
        }

        .highlight-cyan { color: #00f3ff; text-shadow: 0 0 12px #00f3ff; }
        .highlight-red { color: #ff003c; text-shadow: 0 0 12px #ff003c; }
        .highlight-white { color: #ffffff; text-shadow: 0 0 15px #ffffff; }

        .hidden { display: none !important; }
        
        .fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.92); }
            to { opacity: 1; transform: scale(1); }
        }

        /* --- GRAND IDENTITY REVEAL STYLING --- */
        .identity-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .name-primary {
            font-size: 1.8rem;
            color: #ffffff;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 0 0 15px #00f3ff, 0 0 30px #00f3ff;
        }

        .name-secondary {
            font-size: 1.2rem;
            color: #00f3ff;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .aliases-wrapper {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 8px 0;
            flex-wrap: wrap;
        }

        .tag {
            padding: 5px 12px;
            border: 1px solid #ff003c;
            background: rgba(255, 0, 60, 0.15);
            color: #ff003c;
            font-size: 0.95rem;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(255, 0, 60, 0.4);
        }

        .tag-cyan {
            border-color: #00f3ff;
            background: rgba(0, 243, 255, 0.15);
            color: #00f3ff;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.4);
        }

        .role-title {
            font-size: 1.1rem;
            color: #ff003c;
            font-weight: 800;
            margin-top: 10px;
            letter-spacing: 1.5px;
            animation: pulseText 1s infinite alternate;
        }

        @keyframes pulseText {
            from { opacity: 0.7; }
            to { opacity: 1; text-shadow: 0 0 15px #ff003c; }
        }

        /* --- WARP SPEED EXIT ANIMATION --- */
        .warp-exit {
            animation: warpOut 0.8s forwards cubic-bezier(0.7, 0, 0.84, 0);
        }

        @keyframes warpOut {
            0% { opacity: 1; transform: scale(1); filter: brightness(1); }
            50% { filter: brightness(3) blur(2px); }
            100% { opacity: 0; transform: scale(2.5); filter: brightness(5) blur(10px); }
        }
    </style>
</head>
<body>

    <div class="viewport-3d">
        <div class="horizon-glow"></div>
        <div class="grid-ceiling"></div>
        <div class="grid-floor"></div>
    </div>

    <div class="hud-box" id="hud">
        <div class="scan-line"></div>
        
        <div class="loader-ring" id="loader"></div>
        
        <div id="step-sync" class="hidden text-line">
            <div class="highlight-cyan" style="font-size: 1.3rem; margin-bottom: 12px;">[ SYSTEM INITIALIZING ]</div>
            <div>> SYNCING CLOCK...</div>
            <div style="margin-top: 8px;">DATE: <span id="clock-date" class="highlight-white"></span></div>
            <div>TIME: <span id="clock-time" class="highlight-white"></span></div>
        </div>

        <div id="step-greet" class="hidden text-line">
            <div class="highlight-red" style="font-size: 1.1rem; margin-bottom: 10px;">[ STATUS: BIOMETRIC AUTH OK ]</div>
            <div id="dynamic-greeting" class="highlight-cyan" style="font-size: 1.25rem; line-height: 1.5;"></div>
        </div>

        <div id="step-identity" class="hidden identity-container">
            <div class="name-primary">JAYA KUMAR</div>
            <div class="name-secondary">( S JAYA KUMAR )</div>
            
            <div class="aliases-wrapper">
                <span class="tag">STARK DEV</span>
                <span class="tag tag-cyan">JACK</span>
            </div>
            
            <div class="role-title">> FULL-STACK DEVELOPER <</div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            
            // 1. LIVE CLOCK & DATE ENGINE
            function runClock() {
                const now = new Date();
                const days = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"];
                const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
                
                const dateStr = `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
                
                const hrs = String(now.getHours()).padStart(2, '0');
                const mins = String(now.getMinutes()).padStart(2, '0');
                const secs = String(now.getSeconds()).padStart(2, '0');
                const timeStr = `${hrs}:${mins}:${secs} IST`;

                const dateEl = document.getElementById('clock-date');
                const timeEl = document.getElementById('clock-time');
                if (dateEl) dateEl.textContent = dateStr;
                if (timeEl) timeEl.textContent = timeStr;

                return now.getHours();
            }

            const currentHour = runClock();
            setInterval(runClock, 1000);

            // 2. DYNAMIC TIME-BASED GREETING LOGIC
            let timeOfDay = "evening";
            if (currentHour >= 4 && currentHour < 12) {
                timeOfDay = "morning";
            } else if (currentHour >= 12 && currentHour < 17) {
                timeOfDay = "afternoon";
            }
            
            const greetingString = `> Good ${timeOfDay} and welcome to portfolio sir / ma'am.`;
            document.getElementById('dynamic-greeting').textContent = greetingString;

            // 3. EXACT 7-SECOND CHOREOGRAPHY
            const loader = document.getElementById('loader');
            const stepSync = document.getElementById('step-sync');
            const stepGreet = document.getElementById('step-greet');
            const stepIdentity = document.getElementById('step-identity');
            const hud = document.getElementById('hud');

            // 0.0s to 1.5s: Spinning Holographic Loader
            setTimeout(() => {
                loader.classList.add('hidden');
                stepSync.classList.remove('hidden');
                stepSync.classList.add('fade-in');
            }, 1500);

            // 1.5s to 3.5s: Dynamic Greeting
            setTimeout(() => {
                stepSync.classList.add('hidden');
                stepGreet.classList.remove('hidden');
                stepGreet.classList.add('fade-in');
            }, 3500);

            // 3.5s to 6.2s: Grand Name & Identity Reveal
            setTimeout(() => {
                stepGreet.classList.add('hidden');
                stepIdentity.classList.remove('hidden');
                stepIdentity.classList.add('fade-in');
            }, 5000);

            // 6.2s to 7.0s: Warp Speed Screen Transition
            setTimeout(() => {
                document.body.classList.add('warp-exit');
            }, 6200);

            // 7.0s: Automatic Redirect to Main Landing Page
            setTimeout(() => {
                // IMPORTANT: If your main portfolio page is named index.html, change 'home.html' below to 'index.html'
                window.location.href = 'home.html'; 
            }, 7000);
        });
    </script>
</body>
</html>
