<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Boot | Dudhsagar Intro</title>
    <style>
        /* --- GLOBAL RESET & THEME --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }
        
        body {
            background-color: #05140a; /* Deep Jungle Green */
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* --- DUDHSAGAR FALLS PURE CSS ART --- */
        .scenery-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            overflow: hidden;
        }

        /* The cascading water */
        .waterfall {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120vw;
            height: 100vh;
            background: linear-gradient(to bottom, 
                rgba(255,255,255,0.1) 0%, 
                rgba(200,240,255,0.6) 50%, 
                rgba(255,255,255,0.9) 100%);
            background-size: 100% 200%;
            animation: cascade 2s linear infinite;
            mask-image: radial-gradient(ellipse at center, black 20%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 60%);
        }

        @keyframes cascade {
            0% { background-position: 0 0%; }
            100% { background-position: 0 100%; }
        }

        /* The heavy mist at the bottom */
        .mist {
            position: absolute;
            bottom: -10vh;
            left: -10vw;
            width: 120vw;
            height: 40vh;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%);
            filter: blur(20px);
            animation: mistFlow 6s ease-in-out infinite alternate;
        }

        @keyframes mistFlow {
            0% { transform: translateY(0) scale(1); opacity: 0.6; }
            100% { transform: translateY(-30px) scale(1.1); opacity: 0.9; }
        }

        /* The Railway Bridge */
        .bridge {
            position: absolute;
            top: 55%;
            left: 0;
            width: 100vw;
            height: 15px;
            background: #111;
            border-top: 2px solid #333;
            border-bottom: 3px solid #000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            z-index: 2;
        }

        /* The Train */
        .train {
            position: absolute;
            top: calc(55% - 3.2rem); /* Sits right on the bridge */
            right: -150vw; /* Starts off-screen right */
            font-size: 3rem; /* Giant mobile-friendly size */
            white-space: nowrap;
            z-index: 3;
            animation: chugChug 7s linear forwards;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.4));
        }

        @keyframes chugChug {
            0% { transform: translateX(0); }
            100% { transform: translateX(-250vw); } /* Moves all the way left */
        }

        /* --- GLASSMORPHIC HUD PANEL --- */
        .hud-box {
            position: relative;
            z-index: 10;
            width: 92%;
            max-width: 480px;
            min-height: 380px;
            background: rgba(4, 15, 10, 0.65); /* Dark green glass */
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(162, 255, 204, 0.3);
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.05);
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* --- TYPOGRAPHY (LARGE FOR MOBILE) --- */
        .text-line {
            font-size: 1.15rem;
            font-weight: bold;
            line-height: 1.6;
            margin: 6px 0;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
        }

        .highlight-green { color: #5effa8; text-shadow: 0 0 10px rgba(94, 255, 168, 0.6); }
        .highlight-white { color: #ffffff; text-shadow: 0 0 10px rgba(255,255,255,0.8); }

        .hidden { display: none !important; }
        
        .fade-in {
            animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- GRAND IDENTITY REVEAL STYLING --- */
        .identity-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .name-primary {
            font-size: 1.8rem;
            color: #ffffff;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        .name-secondary {
            font-size: 1.2rem;
            color: #5effa8;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .aliases-wrapper {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 8px 0;
            flex-wrap: wrap;
        }

        .tag {
            padding: 5px 12px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 0.95rem;
            font-weight: bold;
            letter-spacing: 1px;
            border-radius: 4px;
        }

        .tag-green {
            border-color: #5effa8;
            background: rgba(94, 255, 168, 0.15);
            color: #5effa8;
        }

        .role-title {
            font-size: 1.1rem;
            color: #ffffff;
            font-weight: 800;
            margin-top: 10px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* --- MIST WHITEOUT EXIT ANIMATION --- */
        .mist-exit {
            animation: whiteOut 0.8s forwards;
        }

        @keyframes whiteOut {
            0% { opacity: 1; filter: brightness(1); }
            100% { opacity: 0; filter: brightness(10) blur(20px); transform: scale(1.1); }
        }
    </style>
</head>
<body>

    <!-- Dudhsagar Scenery -->
    <div class="scenery-container">
        <div class="waterfall"></div>
        <div class="bridge"></div>
        <div class="train">рџљ‚рџљ‹рџљѓрџљ‹рџљѓрџљ‹рџљѓрџљ‹рџљѓрџљ‹рџљѓ</div>
        <div class="mist"></div>
    </div>

    <!-- Glassmorphic HUD Console -->
    <div class="hud-box" id="hud">
        
        <!-- Step 1: Network & Time Sync -->
        <div id="step-sync" class="text-line">
            <div class="highlight-green" style="font-size: 1.3rem; margin-bottom: 12px;">[ ENVIRONMENT SYNC ]</div>
            <div>> LOCAL TIME DETECTED...</div>
            <div style="margin-top: 8px;">DATE: <span id="clock-date" class="highlight-white"></span></div>
            <div>TIME: <span id="clock-time" class="highlight-white"></span></div>
        </div>

        <!-- Step 2: Personalized AI Greeting -->
        <div id="step-greet" class="hidden text-line">
            <div class="highlight-white" style="font-size: 1.1rem; margin-bottom: 10px;">[ PRESENCE VERIFIED ]</div>
            <div id="dynamic-greeting" class="highlight-green" style="font-size: 1.25rem; line-height: 1.5;"></div>
        </div>

        <!-- Step 3: Grand Name & Identity Reveal -->
        <div id="step-identity" class="hidden identity-container">
            <div class="name-primary">JAYA KUMAR</div>
            <div class="name-secondary">( S JAYA KUMAR )</div>
            
            <div class="aliases-wrapper">
                <span class="tag">STARK DEV</span>
                <span class="tag tag-green">JACK</span>
            </div>
            
            <div class="role-title">FULL-STACK DEVELOPER</div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            
            // 1. LIVE CLOCK & DATE ENGINE
            function runClock() {
                const now = new Date();
                const days = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"];
                const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
                
                const dateStr = `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
                
                const hrs = String(now.getHours()).padStart(2, '0');
                const mins = String(now.getMinutes()).padStart(2, '0');
                const secs = String(now.getSeconds()).padStart(2, '0');
                const timeStr = `${hrs}:${mins}:${secs} IST`;

                const dateEl = document.getElementById('clock-date');
                const timeEl = document.getElementById('clock-time');
                if (dateEl) dateEl.textContent = dateStr;
                if (timeEl) timeEl.textContent = timeStr;

                return now.getHours();
            }

            const currentHour = runClock();
            setInterval(runClock, 1000);

            // 2. DYNAMIC TIME-BASED GREETING LOGIC
            let timeOfDay = "evening";
            if (currentHour >= 4 && currentHour < 12) {
                timeOfDay = "morning";
            } else if (currentHour >= 12 && currentHour < 17) {
                timeOfDay = "afternoon";
            }
            
            const greetingString = `> Good ${timeOfDay} and welcome to portfolio sir / ma'am.`;
            document.getElementById('dynamic-greeting').textContent = greetingString;

            // 3. EXACT 7-SECOND CHOREOGRAPHY
            const stepSync = document.getElementById('step-sync');
            const stepGreet = document.getElementById('step-greet');
            const stepIdentity = document.getElementById('step-identity');

            // 0.0s to 2.5s: Time Sync shows as the train rolls in
            
            // 2.5s to 4.5s: Dynamic Greeting
            setTimeout(() => {
                stepSync.classList.add('hidden');
                stepGreet.classList.remove('hidden');
                stepGreet.classList.add('fade-in');
            }, 2500);

            // 4.5s to 6.2s: Grand Name & Identity Reveal
            setTimeout(() => {
                stepGreet.classList.add('hidden');
                stepIdentity.classList.remove('hidden');
                stepIdentity.classList.add('fade-in');
            }, 4500);

            // 6.2s to 7.0s: Mist Whiteout Transition
            setTimeout(() => {
                document.body.classList.add('mist-exit');
            }, 6200);

            // 7.0s: Automatic Redirect to Main Landing Page
            setTimeout(() => {
                // IMPORTANT: If your main portfolio page is named index.html, change 'home.html' below to 'index.html'
                window.location.href = 'home.html'; 
            }, 7000);
        });
    </script>
</body>
</html>
