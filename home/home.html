<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jack | Stark Dev Dashboard</title>
    <style>
        /* Base Hacker/Backend Vibe */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body { background: #050505; color: #e0e0e0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        
        /* Fixed Top Navigation */
        nav {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: rgba(10, 10, 12, 0.9); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 243, 255, 0.2);
            display: flex; justify-content: center; align-items: center; gap: clamp(10px, 3vw, 30px);
            z-index: 1000;
        }

        /* Nav Buttons */
        .nav-btn {
            background: transparent; color: #888; border: none;
            font-size: clamp(0.8rem, 2vw, 1rem); font-weight: bold; text-transform: uppercase;
            cursor: pointer; transition: color 0.3s, text-shadow 0.3s;
        }
        .nav-btn:hover, .nav-btn.active {
            color: #00f3ff; text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        /* The Dynamic Display Screen */
        #display-screen {
            margin-top: 70px; /* Pushes content below the fixed nav */
            padding: clamp(20px, 5vw, 50px);
            flex: 1;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Smooth Fade Animation for Fetched Content */
        .fade-in { animation: fadeIn 0.4s ease-in forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Default Content Container Width */
        .content-container {
            width: 100%; max-width: 800px;
        }
    </style>
</head>
<body>

    <!-- THE STATIC NAVIGATION -->
    <nav id="main-nav">
        <!-- The onclick function calls the exact path to your GitHub folders -->
        <button class="nav-btn active" onclick="loadPage('../home/default.html', this)">Home</button>
        <button class="nav-btn" onclick="loadPage('../Career/career.html', this)">Career</button>
        <button class="nav-btn" onclick="loadPage('../Passoined/projects.html', this)">Projects</button>
        <button class="nav-btn" onclick="loadPage('../Vibes/gallery.html', this)">Vibes</button>
        <button class="nav-btn" onclick="loadPage('../Connect/connect.html', this)">Connect</button>
    </nav>

    <!-- THE DYNAMIC SCREEN -->
    <main id="display-screen">
        <!-- Default Content before anything is clicked -->
        <div class="content-container fade-in">
            <h1 style="color: #00f3ff; margin-bottom: 20px;">> SYSTEM ONLINE</h1>
            <p>Welcome to the central command, Jack. Select a directory above to execute.</p>
        </div>
    </main>

    <!-- THE FETCH ENGINE (SPA LOGIC) -->
    <script>
        function loadPage(filePath, clickedBtn) {
            // 1. Update the active button styling
            if(clickedBtn) {
                document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
                clickedBtn.classList.add('active');
            }

            // 2. Fetch the HTML file from the folder
            fetch(filePath)
                .then(response => {
                    if (!response.ok) throw new Error("404: Directory Not Found");
                    return response.text();
                })
                .then(data => {
                    // 3. Inject the raw HTML into the screen with a fade animation
                    const screen = document.getElementById('display-screen');
                    screen.innerHTML = `<div class="content-container fade-in">${data}</div>`;
                })
                .catch(error => {
                    document.getElementById('display-screen').innerHTML = 
                        `<div class="content-container fade-in"><h2 style="color: #ff0055;">> ERROR</h2><p>${error.message}</p></div>`;
                });
        }
    </script>
</body>
</html>
